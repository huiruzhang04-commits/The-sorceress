<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍄 超级马里欧单词冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#5C94FC;overflow:hidden;touch-action:none;user-select:none}

#game{width:100%;max-width:900px;height:100vh;margin:0 auto;position:relative;overflow:hidden}

/* ========== 背景层 ========== */
#bg-layer{position:absolute;inset:0;z-index:1}

/* 天空渐变 */
.sky{position:absolute;inset:0;background:linear-gradient(180deg,#5C94FC 0%,#87CEEB 40%,#B0E0E6 60%,#E86A17 60%,#8B4513 100%)}

/* 太阳 */
.sun{position:absolute;top:30px;right:50px;width:60px;height:60px;background:#FFD700;border-radius:50%;box-shadow:0 0 40px #FFD700,0 0 80px rgba(255,215,0,.3);animation:sunPulse 3s ease infinite}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* 云朵 - 多层视差 */
.cloud{position:absolute;font-size:50px;opacity:.8;z-index:2}
.cloud-1{top:8%;animation:cloudMove1 25s linear infinite}
.cloud-2{top:15%;animation:cloudMove2 35s linear infinite;animation-delay:-10s;font-size:40px;opacity:.6}
.cloud-3{top:5%;animation:cloudMove3 45s linear infinite;animation-delay:-20s;font-size:35px;opacity:.4}
@keyframes cloudMove1{from{left:100%}to{left:-150px}}
@keyframes cloudMove2{from{left:100%}to{left:-150px}}
@keyframes cloudMove3{from{left:100%}to{left:-150px}}

/* 远山 */
.mountains{position:absolute;bottom:40%;left:0;width:200%;height:150px;z-index:3}
.mountain{position:absolute;bottom:0;width:0;height:0;border-left:80px solid transparent;border-right:80px solid transparent;border-bottom:120px solid #4A7C59}
.mountain:nth-child(2){left:150px;border-bottom-color:#3D6B4A;border-bottom-width:100px}
.mountain:nth-child(3){left:300px;border-bottom-width:140px}
.mountain:nth-child(4){left:500px;border-bottom-color:#3D6B4A;border-bottom-width:90px}

/* 地面 - 多层 */
.ground-layer{position:absolute;bottom:0;width:200%;height:40%;z-index:10}
.ground-top{position:absolute;top:0;left:0;width:100%;height:20px;background:linear-gradient(180deg,#E86A17,#D2691E);border-top:3px solid #5C3317}
.ground-top::before{content:'';position:absolute;top:3px;left:0;width:100%;height:4px;background-image:repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(0,0,0,.1) 20px,rgba(0,0,0,.1) 22px)}
.ground-body{position:absolute;top:20px;left:0;width:100%;height:calc(100% - 20px);background:linear-gradient(180deg,#D2691E,#8B4513,#5C3317)}

/* 地面动画 */
.ground-scroll{animation:groundMove 4s linear infinite}
@keyframes groundMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* 草地装饰 */
.grass{position:absolute;bottom:40%;font-size:20px;z-index:11;animation:grassMove 4s linear infinite}
@keyframes grassMove{from{left:100%}to{left:-50px}}

/* 水管 */
.pipe{position:absolute;bottom:40%;width:60px;height:80px;z-index:20}
.pipe-top{position:absolute;top:0;left:-5px;width:70px;height:25px;background:linear-gradient(180deg,#228B22,#006400);border:3px solid #004d00;border-radius:3px}
.pipe-body{position:absolute;top:25px;left:0;width:60px;height:55px;background:linear-gradient(90deg,#228B22,#32CD32,#228B22);border:3px solid #004d00;border-top:none}

/* ========== 游戏层 ========== */
#game-layer{position:absolute;inset:0;z-index:50}

/* 马里欧 - 像素艺术风格 */
.mario{position:absolute;bottom:40%;left:100px;width:48px;height:64px;z-index:100;transition:none}
/* 帽子 */
.mario .hat{position:absolute;top:0;left:4px;width:40px;height:16px;background:#E70012;border-radius:10px 10px 0 0;box-shadow:inset -4px 0 0 rgba(0,0,0,.2)}
.mario .hat::after{content:'';position:absolute;top:12px;left:-4px;width:48px;height:8px;background:#E70012;border-radius:4px}
/* 脸部 */
.mario .face{position:absolute;top:16px;left:8px;width:32px;height:22px;background:#FFCC99;border-radius:0 0 16px 16px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.1)}
/* 眼睛 */
.mario .eye{position:absolute;top:19px;width:6px;height:8px;background:#000;border-radius:50%}
.mario .eye.left{left:13px}.mario .eye.right{left:25px}
.mario .eye::after{content:'';position:absolute;top:1px;right:1px;width:2px;height:2px;background:#fff;border-radius:50%}
/* 鼻子 */
.mario .nose{position:absolute;top:24px;left:18px;width:12px;height:10px;background:#FFCC99;border-radius:50%;border:1px solid #E8B89D;z-index:5;box-shadow:inset -2px -2px 0 rgba(0,0,0,.1)}
/* 胡子 */
.mario .mustache{position:absolute;top:30px;left:6px;width:36px;height:10px;background:#000;border-radius:0 0 12px 12px}
.mario .mustache::before{content:'';position:absolute;top:-3px;left:-2px;width:12px;height:8px;background:#000;border-radius:50%}
.mario .mustache::after{content:'';position:absolute;top:-3px;right:-2px;width:12px;height:8px;background:#000;border-radius:50%}
/* 身体 */
.mario .body{position:absolute;top:36px;left:6px;width:36px;height:20px;background:#E70012;border-radius:4px;box-shadow:inset -3px 0 0 rgba(0,0,0,.2)}
/* 背带裤 */
.mario .overall{position:absolute;top:38px;left:10px;width:28px;height:16px;background:#0045AD;border-radius:2px}
.mario .strap{position:absolute;top:36px;width:5px;height:12px;background:#0045AD}
.mario .strap.left{left:12px}.mario .strap.right{left:31px}
.mario .button{position:absolute;top:42px;width:6px;height:6px;background:#FFD700;border-radius:50%;box-shadow:inset -1px -1px 0 rgba(0,0,0,.2)}
.mario .button.left{left:14px}.mario .button.right{left:28px}
/* 手臂 */
.mario .arm{position:absolute;top:38px;width:12px;height:16px;background:#E70012;border-radius:6px}
.mario .arm.left{left:-4px;transform:rotate(-25deg)}
.mario .arm.right{left:40px;transform:rotate(25deg)}
.mario .glove{position:absolute;top:52px;width:12px;height:10px;background:#fff;border-radius:50%;border:1px solid #ddd;box-shadow:inset -2px -2px 0 rgba(0,0,0,.1)}
.mario .glove.left{left:-4px}.mario .glove.right{left:40px}
/* 腿 */
.mario .leg{position:absolute;top:54px;width:14px;height:12px;background:#0045AD;border-radius:0 0 6px 6px}
.mario .leg.left{left:10px}.mario .leg.right{left:24px}
/* 鞋子 */
.mario .shoe{position:absolute;top:62px;width:18px;height:10px;background:#5C3317;border-radius:0 0 8px 8px;box-shadow:inset -2px 0 0 rgba(0,0,0,.2)}
.mario .shoe.left{left:6px}.mario .shoe.right{left:24px}

/* 马里欧动画状态 */
.mario.jump{animation:marioJump .5s ease}
@keyframes marioJump{0%,100%{transform:translateY(0)}50%{transform:translateY(-180px)}}
.mario.run .leg.left{animation:runLeg .3s infinite}
.mario.run .leg.right{animation:runLeg .3s infinite .15s}
@keyframes runLeg{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.mario.star{animation:starFlash .2s infinite}
@keyframes starFlash{0%,100%{opacity:1;filter:brightness(1)}50%{opacity:.8;filter:brightness(1.5) hue-rotate(30deg)}}

/* 大马里欧 */
.mario.big{width:60px;height:80px}
.mario.big .hat{left:5px;width:50px;height:20px;border-radius:12px 12px 0 0}
.mario.big .hat::after{top:16px;left:-5px;width:60px;height:10px}
.mario.big .face{left:10px;width:40px;height:28px;border-radius:0 0 20px 20px}
.mario.big .eye{top:22px;width:7px;height:9px}
.mario.big .eye.left{left:18px}.mario.big .eye.right{left:32px}
.mario.big .nose{top:28px;left:22px;width:14px;height:12px}
.mario.big .mustache{top:36px;left:8px;width:44px;height:12px}
.mario.big .mustache::before{top:-4px;left:-3px;width:14px;height:10px}
.mario.big .mustache::after{top:-4px;right:-3px;width:14px;height:10px}
.mario.big .body{left:6px;width:48px;height:26px}
.mario.big .overall{left:10px;width:40px;height:20px}
.mario.big .strap{top:40px;height:14px}
.mario.big .strap.left{left:14px}.mario.big .strap.right{left:41px}
.mario.big .button{top:48px;width:7px;height:7px}
.mario.big .button.left{left:16px}.mario.big .button.right{left:35px}
.mario.big .arm{top:44px;width:14px;height:20px}
.mario.big .arm.left{left:-6px}.mario.big .arm.right{left:52px}
.mario.big .glove{top:60px;width:14px;height:12px}
.mario.big .glove.left{left:-6px}.mario.big .glove.right{left:52px}
.mario.big .leg{top:66px;width:16px;height:14px}
.mario.big .leg.left{left:12px}.mario.big .leg.right{left:32px}
.mario.big .shoe{top:76px;width:20px;height:12px}
.mario.big .shoe.left{left:8px}.mario.big .shoe.right{left:32px}

/* ========== 砖块系统 ========== */
.brick{position:absolute;width:50px;height:50px;z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.brick.hit{transform:translateY(-10px)}
/* 砖块位置 - 错落有致 */
.brick-row-1{bottom:55%}
.brick-row-2{bottom:70%}
.brick-row-3{bottom:85%}

/* 普通砖块 */
.brick.normal{background:linear-gradient(135deg,#B85C38,#8B4513);border:3px solid #5C3317;border-radius:3px;box-shadow:inset -3px -3px 0 rgba(0,0,0,.2),inset 3px 3px 0 rgba(255,255,255,.1)}
.brick.normal::before{content:'';position:absolute;inset:5px;border:2px solid rgba(0,0,0,.2);border-radius:2px}

/* 问号砖块 */
.brick.question{background:linear-gradient(135deg,#FFD700,#FFA500);border:3px solid #B8860B;border-radius:3px;box-shadow:inset -3px -3px 0 rgba(0,0,0,.2),inset 3px 3px 0 rgba(255,255,255,.3);animation:brickFloat 2s ease infinite}
@keyframes brickFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.brick.question .q{color:#B8860B;font-size:28px;font-weight:bold;text-shadow:1px 1px 0 rgba(255,255,255,.5);animation:qFlash .5s infinite}
@keyframes qFlash{0%,100%{opacity:1}50%{opacity:.7}}

/* 道具砖块 */
.brick.item-brick{background:linear-gradient(135deg,#90EE90,#228B22);border:3px solid #006400;border-radius:3px;box-shadow:inset -3px -3px 0 rgba(0,0,0,.2),inset 3px 3px 0 rgba(255,255,255,.2)}
.brick.item-brick .q{color:#006400;font-size:24px}

/* 破碎砖块 */
.brick.broken{background:#666;border-color:#444;opacity:.5;transform:scale(.9)}
.brick.broken .q{display:none}

/* ========== 道具 ========== */
.item{position:absolute;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:32px;z-index:60;animation:itemPop .6s ease}
@keyframes itemPop{0%{transform:translateY(0) scale(.5)}50%{transform:translateY(-70px) scale(1.1)}100%{transform:translateY(0) scale(1)}}

/* 金币 */
.coin{position:absolute;font-size:28px;z-index:60;animation:coinSpin .8s ease forwards}
@keyframes coinSpin{0%{transform:translateY(0) rotateY(0) scale(1)}30%{transform:translateY(-100px) rotateY(180deg) scale(1.2)}100%{transform:translateY(-50px) rotateY(360deg) scale(0);opacity:0}}

/* 火球 */
.fireball{position:absolute;width:22px;height:22px;background:radial-gradient(circle at 30% 30%,#FFD700,#FF4500);border-radius:50%;z-index:90;box-shadow:0 0 10px #FF4500,0 0 20px rgba(255,69,0,.5);animation:fireMove 1s linear forwards}
.fireball::after{content:'';position:absolute;inset:-4px;background:radial-gradient(circle,rgba(255,100,0,.3),transparent 70%);border-radius:50%}
@keyframes fireMove{to{transform:translateX(350px)}}

/* ========== 怪物 ========== */
.enemy{position:absolute;bottom:40%;width:38px;height:38px;z-index:80}
.enemy .goomba-body{position:absolute;bottom:0;width:38px;height:28px;background:linear-gradient(180deg,#8B4513,#5C3317);border-radius:17px 17px 6px 6px;box-shadow:inset -3px 0 0 rgba(0,0,0,.2)}
.enemy .goomba-face{position:absolute;bottom:10px;left:9px;width:22px;height:14px;background:#FFE4B5;border-radius:11px}
.enemy .goomba-eye{position:absolute;bottom:16px;width:6px;height:6px;background:#000;border-radius:50%}
.enemy .goomba-eye.left{left:11px}.enemy .goomba-eye.right{left:24px}
.enemy .goomba-brow{position:absolute;bottom:21px;width:9px;height:3px;background:#000;border-radius:2px}
.enemy .goomba-brow.left{left:9px;transform:rotate(25deg)}.enemy .goomba-brow.right{left:23px;transform:rotate(-25deg)}
.enemy.flat{transform:scaleY(.3);opacity:.6;transition:transform .3s}

/* ========== 粒子效果 ========== */
.particle{position:absolute;pointer-events:none;z-index:200}
.particle.star{animation:particleFloat 1s ease forwards}
@keyframes particleFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(0);opacity:0}}

/* ========== 单词弹窗 ========== */
.word-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#fff,#FFF8DC);border:5px solid #E86A17;border-radius:24px;padding:35px;text-align:center;z-index:300;box-shadow:0 20px 60px rgba(0,0,0,.4),inset 0 -5px 0 rgba(0,0,0,.1);transition:transform .4s cubic-bezier(.68,-.55,.265,1.55);min-width:380px}
.word-popup.show{transform:translate(-50%,-50%) scale(1)}
.word-popup h2{color:#E86A17;font-size:28px;margin-bottom:15px;text-shadow:1px 1px 0 rgba(0,0,0,.1)}
.word-popup .word-en{font-size:48px;font-weight:bold;color:#333;margin:15px 0;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.word-popup .word-pron{color:#888;font-size:20px;margin-bottom:10px;font-style:italic}
.word-popup .choices{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:25px 0}
.word-popup .choice{padding:18px;font-size:24px;border:3px solid #ddd;border-radius:14px;background:linear-gradient(135deg,#f9f9f9,#fff);cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.word-popup .choice:hover{background:linear-gradient(135deg,#FFE4B5,#FFF8DC);border-color:#E86A17;transform:scale(1.05) translateY(-2px);box-shadow:0 5px 20px rgba(232,106,23,.3)}
.word-popup .choice.right{background:linear-gradient(135deg,#90EE90,#98FB98) !important;border-color:#228B22 !important;transform:scale(1.05)}
.word-popup .choice.wrong{background:linear-gradient(135deg,#FFB6C1,#FFC0CB) !important;border-color:#DC143C !important;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.word-popup .feedback{font-size:24px;margin:15px 0;height:35px;font-weight:bold}

/* ========== HUD ========== */
#hud{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;z-index:200;flex-wrap:wrap;gap:8px}
#hud div{background:linear-gradient(135deg,rgba(0,0,0,.7),rgba(0,0,0,.5));color:#fff;padding:10px 18px;border-radius:25px;font-size:16px;font-weight:bold;border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 15px rgba(0,0,0,.3)}

/* ========== 屏幕 ========== */
.screen{position:absolute;inset:0;background:linear-gradient(180deg,#5C94FC 50%,#87CEEB 55%,#E86A17 55%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;color:#fff;text-align:center;padding:20px}
.screen.hide{display:none}
.screen h1{font-size:46px;text-shadow:3px 3px 0 #E86A17,-1px -1px 0 #fff;margin-bottom:20px}
.screen p{font-size:20px;margin-bottom:20px;max-width:480px;line-height:1.8}
.screen .big{font-size:120px;margin:20px 0;animation:bounce 1.2s ease infinite;filter:drop-shadow(0 10px 20px rgba(0,0,0,.3))}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-25px) rotate(5deg)}}
.btn{padding:18px 55px;font-size:26px;border:none;border-radius:50px;background:linear-gradient(135deg,#E86A17,#FF6B35);color:#fff;cursor:pointer;margin:12px;box-shadow:0 8px 25px rgba(232,106,23,.4),inset 0 -3px 0 rgba(0,0,0,.2);transition:all .2s;font-weight:bold}
.btn:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 12px 35px rgba(232,106,23,.5)}
.btn:active{transform:scale(.95)}
.story{background:rgba(0,0,0,.5);padding:25px;border-radius:20px;margin:15px;max-width:480px;border:2px solid rgba(255,255,255,.2);backdrop-filter:blur(5px)}

/* ========== 控制按钮 ========== */
.controls{position:fixed;bottom:25px;right:25px;z-index:500;display:flex;gap:12px}
.ctrl-btn{width:65px;height:65px;background:linear-gradient(135deg,rgba(255,255,255,.3),rgba(255,255,255,.1));border:3px solid rgba(255,255,255,.6);border-radius:50%;font-size:28px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);box-shadow:0 6px 20px rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.2);transition:all .15s}
.ctrl-btn:hover{background:linear-gradient(135deg,rgba(255,255,255,.4),rgba(255,255,255,.2))}
.ctrl-btn:active{background:linear-gradient(135deg,rgba(255,255,255,.5),rgba(255,255,255,.3));transform:scale(0.9)}
.ctrl-btn.fire-btn{background:linear-gradient(135deg,rgba(255,69,0,.6),rgba(255,140,0,.4));border-color:#FF4500}

/* ========== 状态提示 ========== */
.status-msg{position:absolute;top:90px;left:50%;transform:translateX(-50%);font-size:26px;font-weight:bold;color:#FFD700;text-shadow:2px 2px 0 #E86A17,-1px -1px 0 #fff;z-index:200;animation:statusPop 2.5s forwards;white-space:nowrap}
@keyframes statusPop{0%{transform:translateX(-50%) scale(0);opacity:0}15%{transform:translateX(-50%) scale(1.3);opacity:1}80%{transform:translateX(-50%) scale(1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:0}}

/* ========== 关卡提示 ========== */
.level-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:bold;color:#fff;text-shadow:3px 3px 0 #E86A17,-1px -1px 0 rgba(0,0,0,.5);z-index:250;animation:hintPop 2.5s forwards;text-align:center;white-space:nowrap}
@keyframes hintPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}20%{transform:translate(-50%,-50%) scale(1.15);opacity:1}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* ========== 连击显示 ========== */
.combo-display{position:absolute;top:140px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:bold;color:#FF4500;text-shadow:2px 2px 0 #FFD700;z-index:200;animation:comboPop 1.5s forwards}
@keyframes comboPop{0%{transform:translateX(-50%) scale(0)}20%{transform:translateX(-50%) scale(1.3)}80%{transform:translateX(-50%) scale(1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:0}}
</style>
</head>
<body>
<div id="game">

<!-- ========== 背景层 ========== -->
<div id="bg-layer">
  <div class="sky"></div>
  <div class="sun"></div>
  
  <!-- 云朵 -->
  <div class="cloud cloud-1">☁️</div>
  <div class="cloud cloud-2">☁️</div>
  <div class="cloud cloud-3">☁️</div>
  
  <!-- 远山 -->
  <div class="mountains">
    <div class="mountain"></div>
    <div class="mountain"></div>
    <div class="mountain"></div>
    <div class="mountain"></div>
  </div>
  
  <!-- 地面 -->
  <div class="ground-layer ground-scroll">
    <div class="ground-top"></div>
    <div class="ground-body"></div>
  </div>
  
  <!-- 草地装饰 -->
  <div class="grass" style="animation-delay:0s">🌱</div>
  <div class="grass" style="animation-delay:1s;font-size:16px">🌿</div>
  <div class="grass" style="animation-delay:2s;font-size:18px">🍀</div>
</div>

<!-- ========== HUD ========== -->
<div id="hud">
  <div>🍄 超级马里欧单词冒险</div>
  <div>🪙 <span id="coins">0</span></div>
  <div>❤️ <span id="lives">3</span></div>
  <div>⭐ <span id="score">0</span></div>
</div>

<!-- ========== 游戏层 ========== -->
<div id="game-layer">
  
  <!-- 马里欧 -->
  <div id="mario" class="mario">
    <div class="hat"></div>
    <div class="face"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="nose"></div>
    <div class="mustache"></div>
    <div class="body"></div>
    <div class="overall"></div>
    <div class="strap left"></div>
    <div class="strap right"></div>
    <div class="button left"></div>
    <div class="button right"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="glove left"></div>
    <div class="glove right"></div>
    <div class="leg left"></div>
    <div class="leg right"></div>
    <div class="shoe left"></div>
    <div class="shoe right"></div>
  </div>
  
  <!-- 砖块容器 -->
  <div id="bricks"></div>
  
  <!-- 怪物容器 -->
  <div id="enemies"></div>
  
  <!-- 道具容器 -->
  <div id="items"></div>
  
</div>

<!-- ========== 单词弹窗 ========== -->
<div class="word-popup" id="word-popup">
  <h2>🧱 顶到了砖块！</h2>
  <div class="word-pron" id="popup-pron"></div>
  <div class="word-en" id="popup-word"></div>
  <div style="color:#666;margin:12px 0;font-size:18px">选择正确的中文意思才能继续冒险！</div>
  <div class="choices" id="popup-choices"></div>
  <div class="feedback" id="popup-feedback"></div>
</div>

<!-- ========== 开始画面 ========== -->
<div class="screen" id="start-screen">
  <h1>🍄 超级马里欧单词冒险</h1>
  <div class="big">🏃</div>
  <div class="story">
    <p>👸 公主被库巴抓走了！</p>
    <p>🏃 马里欧会自动向前跑</p>
    <p>⬆️ 按上键或点击跳跃（长按跳更高）</p>
    <p>⬅️➡️ 左右键移动选择砖块</p>
    <p>🧱 遇到单词砖要答对才能过</p>
    <p>🍄 顶道具砖获得超能力！</p>
  </div>
  <button class="btn" onclick="startGame()">开始冒险！</button>
</div>

<!-- ========== 胜利画面 ========== -->
<div class="screen hide" id="win-screen">
  <h1>🎉 救出公主了！</h1>
  <div class="big">👸💕</div>
  <div class="story">
    <p>马里欧成功救出了公主！</p>
    <p>🪙 金币：<span id="win-coins">0</span></p>
    <p>⭐ 得分：<span id="win-score">0</span></p>
  </div>
  <button class="btn" onclick="startGame()">再玩一次</button>
</div>

<!-- ========== 失败画面 ========== -->
<div class="screen hide" id="fail-screen">
  <h1>😢 游戏结束</h1>
  <div class="big">🐢</div>
  <div class="story">
    <p>马里欧失败了，但不要放弃！</p>
    <p>⭐ 得分：<span id="fail-score">0</span></p>
  </div>
  <button class="btn" onclick="startGame()">重新挑战</button>
</div>

<!-- ========== 控制按钮 ========== -->
<div class="controls">
  <div class="ctrl-btn" onclick="moveLeft()">⬅️</div>
  <div class="ctrl-btn" onclick="jump()">⬆️</div>
  <div class="ctrl-btn" onclick="moveRight()">➡️</div>
  <div class="ctrl-btn fire-btn hide" id="fire-btn" onclick="shootFire()">🔥</div>
</div>

</div>

<script>
// ========== 音效系统 ==========
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio(){if(!audioCtx)audioCtx=new AudioContext();return audioCtx}
function playSound(freq,dur,type='square',vol=0.1){
  try{const ctx=getAudio();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}
}
function sfxJump(){playSound(300,0.15,'square',0.08);playSound(450,0.15,'square',0.06)}
function sfxCoin(){playSound(900,0.1,'sine',0.1);setTimeout(()=>playSound(1200,0.1,'sine',0.1),80)}
function sfxHit(){playSound(150,0.1,'square',0.1);playSound(100,0.15,'square',0.1)}
function sfxCorrect(){playSound(523,0.1,'sine',0.12);setTimeout(()=>playSound(659,0.1,'sine',0.12),100);setTimeout(()=>playSound(784,0.2,'sine',0.15),200)}
function sfxWrong(){playSound(200,0.2,'sawtooth',0.1);setTimeout(()=>playSound(150,0.25,'sawtooth',0.1),150)}
function sfxPowerUp(){[300,400,500,600,800].forEach((f,i)=>setTimeout(()=>playSound(f,0.15,'sine',0.12),i*100))}
function sfxFire(){playSound(800,0.1,'sawtooth',0.1);setTimeout(()=>playSound(600,0.15,'sawtooth',0.08),50)}
function sfxBrickHit(){playSound(400,0.08,'square',0.1);playSound(300,0.1,'square',0.08)}

// ========== 单词库 ==========
const WORDS_EASY = [
  {en:'red',cn:'红色',pron:'/red/'},{en:'blue',cn:'蓝色',pron:'/bluː/'},
  {en:'cat',cn:'猫',pron:'/kæt/'},{en:'dog',cn:'狗',pron:'/dɒɡ/'},
  {en:'one',cn:'一',pron:'/wʌn/'},{en:'two',cn:'二',pron:'/tuː/'}
];
const WORDS_MEDIUM = [
  {en:'green',cn:'绿色',pron:'/ɡriːn/'},{en:'yellow',cn:'黄色',pron:'/ˈjel.əʊ/'},
  {en:'bird',cn:'鸟',pron:'/bɜːd/'},{en:'fish',cn:'鱼',pron:'/fɪʃ/'},
  {en:'three',cn:'三',pron:'/θriː/'},{en:'apple',cn:'苹果',pron:'/ˈæp.əl/'}
];
const WORDS_HARD = [
  {en:'banana',cn:'香蕉',pron:'/bəˈnɑː.nə/'},{en:'orange',cn:'橙子',pron:'/ˈɒr.ɪndʒ/'},
  {en:'elephant',cn:'大象',pron:'/ˈel.ɪ.fənt/'},{en:'giraffe',cn:'长颈鹿',pron:'/dʒɪˈrɑːf/'},
  {en:'beautiful',cn:'美丽的',pron:'/ˈbjuː.tɪ.fəl/'},{en:'butterfly',cn:'蝴蝶',pron:'/ˈbʌt.ə.flaɪ/'}
];

// ========== 物理系统 ==========
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const MOVE_SPEED = 3;
const FRICTION = 0.85;
const ACCELERATION = 0.5;

// ========== 游戏状态 ==========
let coins=0,score=0,lives=3;
let isBig=false,hasFire=false,isStar=false;
let gameActive=false,gamePaused=false;
let gameLoop=null,spawnTimer=null;
let enemies=[],bricks=[],items=[];
let distance=0,wordBricksHit=0;
let currentLevel=1;
let combo=0,maxCombo=0;

let marioX=100,marioY=0;
let velocityX=0,velocityY=0;
let isJumping=false,isOnGround=true;
let jumpTimer=0,maxJumpTime=15;
let keys={left:false,right:false,up:false};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// ========== 关卡系统 ==========
function getLevelConfig(level){
  const configs=[
    {speed:2,enemyRate:0.3,brickRate:0.4,words:WORDS_EASY,name:'1-1 新手村',hint:'简单单词，熟悉操作'},
    {speed:2.5,enemyRate:0.5,brickRate:0.5,words:WORDS_EASY.concat(WORDS_MEDIUM.slice(0,3)),name:'1-2 绿草地',hint:'加入中等难度单词'},
    {speed:3,enemyRate:0.6,brickRate:0.6,words:WORDS_MEDIUM,name:'1-3 地下城',hint:'更多怪物，更快节奏'},
    {speed:3.5,enemyRate:0.7,brickRate:0.7,words:WORDS_MEDIUM.concat(WORDS_HARD.slice(0,3)),name:'1-4 天空城',hint:'困难单词出现'},
    {speed:4,enemyRate:0.8,brickRate:0.8,words:WORDS_HARD,name:'🏰 最终城堡',hint:'最难挑战，救出公主!'}
  ];
  return configs[Math.min(level-1,configs.length-1)];
}

function showLevelHint(config){
  const hint=document.createElement('div');
  hint.className='level-hint';
  hint.innerHTML=config.name+'<br><span style="font-size:22px">'+config.hint+'</span>';
  document.getElementById('game').appendChild(hint);
  setTimeout(()=>hint.remove(),2500);
}

function showCombo(){
  if(combo<2)return;
  const comboEl=document.createElement('div');
  comboEl.className='combo-display';
  comboEl.textContent='🔥 '+combo+'连击！';
  document.getElementById('game').appendChild(comboEl);
  setTimeout(()=>comboEl.remove(),1500);
}

// ========== 游戏控制 ==========
function startGame(){
  coins=0;score=0;lives=3;isBig=false;hasFire=false;isStar=false;
  distance=0;wordBricksHit=0;currentLevel=1;combo=0;maxCombo=0;
  enemies=[];bricks=[];items=[];
  gameActive=true;gamePaused=false;
  
  marioX=100;marioY=0;
  velocityX=0;velocityY=0;
  isJumping=false;isOnGround=true;
  jumpTimer=0;
  
  updateHUD();
  updateMario();
  updateMarioPosition();
  
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hide'));
  document.getElementById('word-popup').classList.remove('show');
  document.getElementById('fire-btn').classList.add('hide');
  
  document.getElementById('bricks').innerHTML='';
  document.getElementById('enemies').innerHTML='';
  document.getElementById('items').innerHTML='';
  
  showLevelHint(getLevelConfig(1));
  
  if(gameLoop)cancelAnimationFrame(gameLoop);
  gameLoop=requestAnimationFrame(gameUpdate);
  
  if(spawnTimer)clearInterval(spawnTimer);
  spawnTimer=setInterval(spawnThings,2000);
}

function gameUpdate(){
  if(!gameActive||gamePaused){
    gameLoop=requestAnimationFrame(gameUpdate);
    return;
  }
  
  updatePhysics();
  
  distance+=getLevelConfig(currentLevel).speed;
  
  if(wordBricksHit>=currentLevel*3&&currentLevel<5){
    currentLevel++;
    const config=getLevelConfig(currentLevel);
    showLevelHint(config);
  }
  
  enemies.forEach((e,i)=>{
    e.x-=getLevelConfig(currentLevel).speed;
    e.el.style.left=e.x+'px';
    if(e.x<-50){e.el.remove();enemies.splice(i,1)}
    
    if(!e.dead&&checkCollision(document.getElementById('mario'),e.el)){
      if(isStar){killEnemy(e,i)}
      else if(velocityY>0&&!isOnGround){killEnemy(e,i);score+=100;sfxHit();velocityY=-5}
      else{hurtMario()}
    }
  });
  
  bricks.forEach((b,i)=>{
    b.x-=getLevelConfig(currentLevel).speed;
    b.el.style.left=b.x+'px';
    if(b.x<-100){b.el.remove();bricks.splice(i,1)}
    
    if(!b.hit&&checkCollision(document.getElementById('mario'),b.el)){
      hitBrick(b,i);
    }
  });
  
  items.forEach((item,i)=>{
    item.x-=getLevelConfig(currentLevel).speed;
    item.el.style.left=item.x+'px';
    if(item.x<-50){item.el.remove();items.splice(i,1)}
    
    if(checkCollision(document.getElementById('mario'),item.el)){
      getItem(item.type);
      item.el.remove();
      items.splice(i,1);
    }
  });
  
  if(currentLevel===5&&wordBricksHit>=12){
    winGame();
    return;
  }
  
  gameLoop=requestAnimationFrame(gameUpdate);
}

function updatePhysics(){
  if(keys.left){
    velocityX-=ACCELERATION;
    if(velocityX<-MOVE_SPEED)velocityX=-MOVE_SPEED;
    document.getElementById('mario').classList.add('run');
  }else if(keys.right){
    velocityX+=ACCELERATION;
    if(velocityX>MOVE_SPEED)velocityX=MOVE_SPEED;
    document.getElementById('mario').classList.add('run');
  }else{
    velocityX*=FRICTION;
    if(Math.abs(velocityX)<0.1)velocityX=0;
    document.getElementById('mario').classList.remove('run');
  }
  
  marioX+=velocityX;
  
  const gameW=document.getElementById('game').offsetWidth;
  if(marioX<20)marioX=20;
  if(marioX>gameW-60)marioX=gameW-60;
  
  if(keys.up&&isOnGround&&!isJumping){
    isJumping=true;
    isOnGround=false;
    velocityY=JUMP_FORCE; // JUMP_FORCE = -12，向上跳
    jumpTimer=0;
    sfxJump();
  }
  
  // 长按跳跃键增加跳跃高度（但保持向上）
  if(keys.up&&isJumping&&jumpTimer<maxJumpTime&&velocityY<0){
    velocityY+=JUMP_FORCE*0.08; // 额外的向上力
    jumpTimer++;
  }
  
  if(!isOnGround){
    velocityY+=GRAVITY;
    marioY+=velocityY;
    
    // 限制最大下落速度
    if(velocityY>15)velocityY=15;
    
    // 落地检测 - 当marioY回到0或以下
    if(marioY>=0){
      marioY=0;
      velocityY=0;
      isOnGround=true;
      isJumping=false;
      jumpTimer=0;
    }
  }
  
  updateMarioPosition();
}

function updateMarioPosition(){
  const mario=document.getElementById('mario');
  mario.style.left=marioX+'px';
  
  // 使用像素单位而不是百分比，避免跳跃问题
  const groundHeight=window.innerHeight*0.4;
  const jumpHeight=marioY*5; // 缩放跳跃高度
  mario.style.bottom=(groundHeight+jumpHeight)+'px';
  
  if(!isOnGround){
    mario.classList.add('jump');
  }else{
    mario.classList.remove('jump');
  }
  
  if(velocityX>0.5)mario.style.transform='scaleX(1)';
  else if(velocityX<-0.5)mario.style.transform='scaleX(-1)';
}

function spawnThings(){
  if(!gameActive||gamePaused)return;
  
  const config=getLevelConfig(currentLevel);
  const gameW=document.getElementById('game').offsetWidth;
  
  if(Math.random()<config.enemyRate){
    spawnEnemy(gameW+50);
  }
  
  if(Math.random()<config.brickRate){
    const isWordBrick=Math.random()<0.6;
    if(isWordBrick){
      spawnWordBrick(gameW+50,config.words);
    }else{
      spawnItemBrick(gameW+50);
    }
  }
}

function spawnEnemy(x){
  const enemy=document.createElement('div');
  enemy.className='enemy';
  enemy.innerHTML='<div class="goomba-body"></div><div class="goomba-face"></div><div class="goomba-eye left"></div><div class="goomba-eye right"></div><div class="goomba-brow left"></div><div class="goomba-brow right"></div>';
  enemy.style.left=x+'px';
  document.getElementById('enemies').appendChild(enemy);
  enemies.push({el:enemy,x:x,dead:false});
}

function spawnWordBrick(x,wordPool){
  const brick=document.createElement('div');
  brick.className='brick question';
  brick.innerHTML='<span class="q">?</span>';
  brick.style.left=x+'px';
  
  // 随机高度 - 错落有致
  const rows=['brick-row-1','brick-row-2','brick-row-3'];
  const row=rows[Math.floor(Math.random()*rows.length)];
  brick.classList.add(row);
  
  document.getElementById('bricks').appendChild(brick);
  
  const word=wordPool[Math.floor(Math.random()*wordPool.length)];
  bricks.push({el:brick,x:x,hit:false,word:word,type:'word'});
}

function spawnItemBrick(x){
  const brick=document.createElement('div');
  brick.className='brick item-brick';
  brick.innerHTML='<span class="q">?</span>';
  brick.style.left=x+'px';
  
  // 随机高度 - 错落有致
  const rows=['brick-row-1','brick-row-2'];
  const row=rows[Math.floor(Math.random()*rows.length)];
  brick.classList.add(row);
  
  document.getElementById('bricks').appendChild(brick);
  
  const items=['mushroom','flower','star'];
  const item=items[Math.floor(Math.random()*items.length)];
  bricks.push({el:brick,x:x,hit:false,item:item,type:'item'});
}

function hitBrick(brick,index){
  if(brick.hit)return;
  brick.hit=true;
  brick.el.classList.add('hit');
  setTimeout(()=>brick.el.classList.add('broken'),200);
  sfxBrickHit();
  
  if(brick.type==='word'){
    gamePaused=true;
    showWordPopup(brick.word);
  }else if(brick.type==='item'){
    spawnItem(brick.x,brick.item);
    
    // 金币粒子
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        const coin=document.createElement('div');
        coin.className='coin';
        coin.textContent='🪙';
        coin.style.left=(brick.x+i*15)+'px';
        coin.style.bottom='65%';
        document.getElementById('items').appendChild(coin);
        setTimeout(()=>coin.remove(),800);
      },i*100);
    }
    
    coins+=3;
    sfxCoin();
  }
  
  updateHUD();
}

function spawnItem(x,type){
  const itemEl=document.createElement('div');
  itemEl.className='item';
  const icons={mushroom:'🍄',flower:'🌸',star:'⭐'};
  itemEl.textContent=icons[type];
  itemEl.style.left=x+'px';
  document.getElementById('items').appendChild(itemEl);
  items.push({el:itemEl,x:x,type:type});
}

function getItem(type){
  sfxPowerUp();
  showStatus('获得'+{mushroom:'蘑菇！变大了！',flower:'花朵！可以喷火！',star:'星星！无敌了！'}[type]);
  
  if(type==='mushroom'){isBig=true;updateMario()}
  else if(type==='flower'){isBig=true;hasFire=true;updateMario();document.getElementById('fire-btn').classList.remove('hide')}
  else if(type==='star'){
    isStar=true;
    document.getElementById('mario').classList.add('star');
    setTimeout(()=>{isStar=false;document.getElementById('mario').classList.remove('star')},5000);
  }
}

function showWordPopup(word){
  const popup=document.getElementById('word-popup');
  document.getElementById('popup-pron').textContent=word.pron;
  document.getElementById('popup-word').textContent=word.en;
  document.getElementById('popup-feedback').textContent='';
  
  const optionCount=currentLevel>=4?4:currentLevel>=2?3:2;
  const others=WORDS_EASY.concat(WORDS_MEDIUM).concat(WORDS_HARD).filter(w=>w.en!==word.en);
  const wrongs=shuffle(others).slice(0,optionCount-1).map(w=>w.cn);
  const opts=shuffle([word.cn,...wrongs]);
  
  const choicesDiv=document.getElementById('popup-choices');
  choicesDiv.innerHTML='';
  
  if(optionCount<=2){
    choicesDiv.style.gridTemplateColumns='1fr 1fr';
  }else if(optionCount===3){
    choicesDiv.style.gridTemplateColumns='1fr 1fr 1fr';
  }else{
    choicesDiv.style.gridTemplateColumns='1fr 1fr';
  }
  
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=function(){checkAnswer(this,opt,word.cn)};
    choicesDiv.appendChild(btn);
  });
  
  popup.classList.add('show');
}

function checkAnswer(btn,ans,correct){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('popup-feedback');
  
  if(ans===correct){
    btn.classList.add('right');
    combo++;
    if(combo>maxCombo)maxCombo=combo;
    
    const bonus=combo>1?' (连击x'+combo+')':'';
    fb.innerHTML='<span style="color:green">✅ 答对了！'+bonus+'</span>';
    sfxCorrect();
    
    const points=100*combo;
    coins+=10*combo;
    score+=points;
    wordBricksHit++;
    
    if(combo>=2)showCombo();
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===correct)b.classList.add('right')});
    fb.innerHTML='<span style="color:red">❌ 不对，答案是：'+correct+'</span>';
    sfxWrong();
    combo=0;
    lives--;
  }
  
  updateHUD();
  
  setTimeout(()=>{
    document.getElementById('word-popup').classList.remove('show');
    gamePaused=false;
    if(lives<=0)loseGame();
  },1500);
}

function killEnemy(enemy,index){
  enemy.dead=true;
  enemy.el.classList.add('flat');
  score+=100;
  setTimeout(()=>{enemy.el.remove();enemies.splice(index,1)},500);
}

function hurtMario(){
  if(isStar)return;
  
  if(isBig){
    isBig=false;
    hasFire=false;
    updateMario();
    document.getElementById('fire-btn').classList.add('hide');
    showStatus('变小了！');
  }else{
    lives--;
    showStatus('哎呀！');
    if(lives<=0)loseGame();
  }
  updateHUD();
}

function shootFire(){
  if(!hasFire)return;
  sfxFire();
  const mario=document.getElementById('mario');
  const fireball=document.createElement('div');
  fireball.className='fireball';
  fireball.style.left=(mario.offsetLeft+40)+'px';
  fireball.style.bottom=(40+marioY)+'%';
  document.getElementById('game').appendChild(fireball);
  
  const checkFireHit=setInterval(()=>{
    enemies.forEach((e,i)=>{
      if(!e.dead&&checkCollision(fireball,e.el)){
        killEnemy(e,i);
        fireball.remove();
        clearInterval(checkFireHit);
      }
    });
  },50);
  
  setTimeout(()=>{fireball.remove();clearInterval(checkFireHit)},1000);
}

function checkCollision(el1,el2){
  const r1=el1.getBoundingClientRect();
  const r2=el2.getBoundingClientRect();
  return!(r1.right<r2.left||r1.left>r2.right||r1.bottom<r2.top||r1.top>r2.bottom);
}

function updateMario(){
  const mario=document.getElementById('mario');
  if(isBig)mario.classList.add('big');
  else mario.classList.remove('big');
}

function updateHUD(){
  document.getElementById('coins').textContent=coins;
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
}

function showStatus(msg){
  const status=document.createElement('div');
  status.className='status-msg';
  status.textContent=msg;
  document.getElementById('game').appendChild(status);
  setTimeout(()=>status.remove(),2500);
}

function winGame(){
  gameActive=false;
  clearInterval(spawnTimer);
  sfxCorrect();
  document.getElementById('win-coins').textContent=coins;
  document.getElementById('win-score').textContent=score;
  document.getElementById('win-screen').classList.remove('hide');
}

function loseGame(){
  gameActive=false;
  clearInterval(spawnTimer);
  document.getElementById('fail-score').textContent=score;
  document.getElementById('fail-screen').classList.remove('hide');
}

// ========== 控制函数 ==========
function moveLeft(){keys.left=true;keys.right=false;setTimeout(()=>keys.left=false,100)}
function moveRight(){keys.right=true;keys.left=false;setTimeout(()=>keys.right=false,100)}
function jump(){keys.up=true;setTimeout(()=>keys.up=false,200)}

// 键盘控制
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA'){e.preventDefault();keys.left=true}
  else if(e.code==='ArrowRight'||e.code==='KeyD'){e.preventDefault();keys.right=true}
  else if(e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW'){e.preventDefault();keys.up=true}
  else if(e.code==='KeyF'){e.preventDefault();shootFire()}
});

document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=false;
  else if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=false;
  else if(e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW')keys.up=false;
});
</script>
