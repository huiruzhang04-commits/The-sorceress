<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马里欧学英语</title>
<style>
body{font-family:Arial,'Microsoft YaHei',sans-serif;background:#87CEEB;margin:0;padding:10px;min-height:100vh}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:15px;padding:20px}
.center{text-align:center}
.title{color:#FF6600;font-size:28px;margin:10px 0}
.btn{background:#FF6600;color:#fff;border:none;padding:15px 40px;font-size:20px;border-radius:25px;cursor:pointer;margin:10px}
.btn:hover{background:#FF8800}
.word-box{background:#FFFACD;border:3px solid #FFD700;border-radius:10px;padding:20px;margin:15px 0;text-align:center}
.word-en{font-size:36px;font-weight:bold;color:#FF6600}
.word-pron{color:#888;font-size:16px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.choice{background:#f0f0f0;border:2px solid #ccc;padding:15px;font-size:18px;border-radius:10px;cursor:pointer}
.choice:hover{background:#FFE4B5;border-color:#FF6600}
.choice.right{background:#90EE90;border-color:green}
.choice.wrong{background:#FFB6C1;border-color:red}
.feedback{font-size:20px;text-align:center;margin:10px 0;height:30px}
.next-btn{background:#4CAF50;color:#fff;border:none;padding:12px 30px;font-size:18px;border-radius:20px;cursor:pointer;display:none;margin:10px auto}
.stats{display:flex;justify-content:center;gap:15px;margin:10px 0;font-size:16px}
.stat{background:#FFE4B5;padding:5px 15px;border-radius:15px}
.progress{height:10px;background:#eee;border-radius:5px;margin:10px 0}
.progress-bar{height:100%;background:#FFD700;border-radius:5px;transition:width .3s}
.end-emoji{font-size:60px;margin:15px 0}
.result{font-size:18px;line-height:2}
.page{display:none}
.page.active{display:block}
</style>
</head>
<body>

<div class="box">

<!-- 开始页 -->
<div id="page-start" class="page active center">
  <h1 class="title">🍄 马里欧学英语</h1>
  <p style="color:#666;font-size:18px">看英文单词，选正确的中文意思</p>
  <div style="font-size:80px;margin:20px">🍄</div>
  <button class="btn" onclick="startGame()">开始游戏</button>
  <p style="color:#888;margin-top:15px">共20题，适合7岁小朋友</p>
</div>

<!-- 游戏页 -->
<div id="page-game" class="page">
  <div class="center">
    <h2 class="title">🍄 马里欧学英语</h2>
    <div class="stats">
      <span class="stat">🪙 <b id="coins">0</b></span>
      <span class="stat">⭐ <b id="score">0</b>分</span>
      <span class="stat">题 <b id="qnum">1</b>/20</span>
    </div>
  </div>
  <div class="progress"><div class="progress-bar" id="progress" style="width:0%"></div></div>
  
  <div class="word-box">
    <div class="word-pron" id="pron"></div>
    <div class="word-en" id="word"></div>
    <div style="color:#666;margin-top:10px">这个单词是什么意思？</div>
  </div>
  
  <div class="feedback" id="feedback"></div>
  
  <div class="choices" id="choices"></div>
  
  <div class="center">
    <button class="next-btn" id="nextbtn" onclick="nextQ()">下一题 →</button>
  </div>
</div>

<!-- 结束页 -->
<div id="page-end" class="page center">
  <h2 class="title">🎉 游戏结束！</h2>
  <div class="end-emoji" id="emoji">🏆</div>
  <div class="result">
    <div>🪙 金币：<b id="endcoins">0</b></div>
    <div>⭐ 得分：<b id="endscore">0</b></div>
    <div>✅ 对：<b id="endright">0</b>题</div>
    <div>❌ 错：<b id="endwrong">0</b>题</div>
  </div>
  <button class="btn" onclick="startGame()">再玩一次</button>
</div>

</div>

<script>
const WORDS=[
  {en:'red',cn:'红色',pron:'/red/'},{en:'blue',cn:'蓝色',pron:'/bluː/'},
  {en:'green',cn:'绿色',pron:'/ɡriːn/'},{en:'yellow',cn:'黄色',pron:'/ˈjel.əʊ/'},
  {en:'one',cn:'一',pron:'/wʌn/'},{en:'two',cn:'二',pron:'/tuː/'},
  {en:'three',cn:'三',pron:'/θriː/'},{en:'cat',cn:'猫',pron:'/kæt/'},
  {en:'dog',cn:'狗',pron:'/dɒɡ/'},{en:'bird',cn:'鸟',pron:'/bɜːd/'},
  {en:'apple',cn:'苹果',pron:'/ˈæp.əl/'},{en:'banana',cn:'香蕉',pron:'/bəˈnɑː.nə/'},
  {en:'head',cn:'头',pron:'/hed/'},{en:'eye',cn:'眼睛',pron:'/aɪ/'},
  {en:'hand',cn:'手',pron:'/hænd/'},{en:'run',cn:'跑',pron:'/rʌn/'},
  {en:'jump',cn:'跳',pron:'/dʒʌmp/'},{en:'eat',cn:'吃',pron:'/iːt/'},
  {en:'father',cn:'爸爸',pron:'/ˈfɑː.ðər/'},{en:'mother',cn:'妈妈',pron:'/ˈmʌð.ər/'}
];

let q=0,coins=0,score=0,right=0,wrong=0,current=null;

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startGame(){
  q=0;coins=0;score=0;right=0;wrong=0;
  show('page-game');
  showQ();
}

function showQ(){
  current=WORDS[q];
  document.getElementById('pron').textContent=current.pron;
  document.getElementById('word').textContent=current.en;
  document.getElementById('qnum').textContent=q+1;
  document.getElementById('feedback').textContent='';
  document.getElementById('nextbtn').style.display='none';
  document.getElementById('progress').style.width=(q/WORDS.length*100)+'%';
  
  const others=WORDS.filter(w=>w.en!==current.en);
  const wrongs=shuffle(others).slice(0,3).map(w=>w.cn);
  const opts=shuffle([current.cn,...wrongs]);
  
  const box=document.getElementById('choices');
  box.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=function(){check(this,opt)};
    box.appendChild(btn);
  });
}

function check(btn,ans){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  
  if(ans===current.cn){
    btn.className='choice right';
    fb.innerHTML='<span style="color:green">✅ 太棒了！+10金币 +100分</span>';
    coins+=10;score+=100;right++;
  }else{
    btn.className='choice wrong';
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.textContent===current.cn)b.className='choice right';
    });
    fb.innerHTML='<span style="color:red">❌ 不对，答案是：'+current.cn+'</span>';
    wrong++;
  }
  
  document.getElementById('coins').textContent=coins;
  document.getElementById('score').textContent=score;
  document.getElementById('nextbtn').style.display='inline-block';
}

function nextQ(){
  q++;
  if(q>=WORDS.length){
    show('page-end');
    document.getElementById('endcoins').textContent=coins;
    document.getElementById('endscore').textContent=score;
    document.getElementById('endright').textContent=right;
    document.getElementById('endwrong').textContent=wrong;
    document.getElementById('emoji').textContent=wrong===0?'🏆':wrong<=3?'😊':wrong<=6?'😐':'😢';
  }else{
    showQ();
  }
}
</script>
</body>
</html>
