<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍄 超级马里欧单词冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#5C94FC;overflow:hidden;touch-action:none;user-select:none}

#game{width:100%;max-width:900px;height:100vh;margin:0 auto;position:relative;background:linear-gradient(180deg,#5C94FC 60%,#E86A17 60%);overflow:hidden}

/* 地面 */
.ground{position:absolute;bottom:0;width:200%;height:40%;background:linear-gradient(180deg,#E86A17,#8B4513);border-top:4px solid #5C3317;animation:groundMove 3s linear infinite}
.ground::before{content:'';position:absolute;top:0;left:0;width:100%;height:15px;background-image:repeating-linear-gradient(90deg,transparent,transparent 25px,#5C3317 25px,#5C3317 28px)}
@keyframes groundMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* 云朵 */
.cloud{position:absolute;font-size:40px;opacity:.6;animation:cloudMove linear infinite}
@keyframes cloudMove{from{left:100%}to{left:-100px}}

/* 山 */
.mountain{position:absolute;bottom:40%;font-size:80px;opacity:.8}

/* 马里欧 */
.mario{position:absolute;bottom:40%;left:100px;width:44px;height:56px;z-index:100;transition:transform .1s}
.mario .hat{position:absolute;top:0;left:2px;width:40px;height:14px;background:#E70012;border-radius:12px 12px 0 0}
.mario .hat::after{content:'';position:absolute;top:10px;left:-2px;width:44px;height:6px;background:#E70012;border-radius:3px}
.mario .face{position:absolute;top:14px;left:6px;width:32px;height:20px;background:#FFCC99;border-radius:0 0 14px 14px}
.mario .eye{position:absolute;top:17px;width:5px;height:7px;background:#000;border-radius:50%}
.mario .eye.left{left:12px}.mario .eye.right{left:24px}
.mario .nose{position:absolute;top:21px;left:17px;width:10px;height:8px;background:#FFCC99;border-radius:50%;border:1px solid #E8B89D;z-index:5}
.mario .mustache{position:absolute;top:26px;left:8px;width:28px;height:8px;background:#000;border-radius:0 0 10px 10px}
.mario .mustache::before{content:'';position:absolute;top:-2px;left:-3px;width:10px;height:6px;background:#000;border-radius:50%}
.mario .mustache::after{content:'';position:absolute;top:-2px;right:-3px;width:10px;height:6px;background:#000;border-radius:50%}
.mario .body{position:absolute;top:32px;left:4px;width:36px;height:18px;background:#E70012;border-radius:4px}
.mario .overall{position:absolute;top:34px;left:6px;width:32px;height:14px;background:#0045AD;border-radius:2px}
.mario .strap{position:absolute;top:32px;width:4px;height:10px;background:#0045AD}
.mario .strap.left{left:10px}.mario .strap.right{left:30px}
.mario .button{position:absolute;top:38px;width:5px;height:5px;background:#FFD700;border-radius:50%}
.mario .button.left{left:12px}.mario .button.right{left:27px}
.mario .arm{position:absolute;top:34px;width:10px;height:14px;background:#E70012;border-radius:5px}
.mario .arm.left{left:-4px;transform:rotate(-20deg)}
.mario .arm.right{left:38px;transform:rotate(20deg)}
.mario .glove{position:absolute;top:46px;width:10px;height:8px;background:#fff;border-radius:50%;border:1px solid #ddd}
.mario .glove.left{left:-4px}.mario .glove.right{left:38px}
.mario .leg{position:absolute;top:48px;width:12px;height:10px;background:#0045AD;border-radius:0 0 4px 4px}
.mario .leg.left{left:8px}.mario .leg.right{left:24px}
.mario .shoe{position:absolute;top:54px;width:16px;height:8px;background:#5C3317;border-radius:0 0 6px 6px}
.mario .shoe.left{left:4px}.mario .shoe.right{left:24px}
.mario.jump{animation:marioJump .5s ease}
@keyframes marioJump{0%,100%{transform:translateY(0)}50%{transform:translateY(-180px)}}
.mario.star{animation:starFlash .2s infinite}
@keyframes starFlash{0%,100%{opacity:1}50%{opacity:.5}}

/* 大马里欧 */
.mario.big{width:56px;height:72px}
.mario.big .hat{left:3px;width:50px;height:18px;border-radius:15px 15px 0 0}
.mario.big .hat::after{top:13px;left:-2px;width:54px;height:8px}
.mario.big .face{left:8px;width:40px;height:26px;border-radius:0 0 18px 18px}
.mario.big .eye{top:20px;width:6px;height:8px}
.mario.big .eye.left{left:16px}.mario.big .eye.right{left:30px}
.mario.big .nose{top:25px;left:21px;width:12px;height:10px}
.mario.big .mustache{top:32px;left:10px;width:36px;height:10px}
.mario.big .body{left:5px;width:46px;height:24px}
.mario.big .overall{left:8px;width:40px;height:18px}
.mario.big .strap{top:40px;height:12px}
.mario.big .strap.left{left:13px}.mario.big .strap.right{left:37px}
.mario.big .button{top:46px;width:6px;height:6px}
.mario.big .button.left{left:15px}.mario.big .button.right{left:33px}
.mario.big .arm{top:42px;width:12px;height:18px}
.mario.big .arm.left{left:-5px}.mario.big .arm.right{left:49px}
.mario.big .glove{top:56px;width:12px;height:10px}
.mario.big .glove.left{left:-5px}.mario.big .glove.right{left:49px}
.mario.big .leg{top:62px;width:14px;height:12px}
.mario.big .leg.left{left:10px}.mario.big .leg.right{left:32px}
.mario.big .shoe{top:70px;width:18px;height:10px}
.mario.big .shoe.left{left:6px}.mario.big .shoe.right{left:32px}

/* 砖块 */
.brick{position:absolute;width:50px;height:50px;background:linear-gradient(135deg,#B85C38,#8B4513);border:3px solid #5C3317;border-radius:3px;display:flex;align-items:center;justify-content:center;z-index:50}
.brick .q{color:#FFD700;font-size:24px;font-weight:bold;text-shadow:2px 2px 0 #B8860B;animation:qFlash .5s infinite}
@keyframes qFlash{0%,100%{opacity:1}50%{opacity:.6}}
.brick.question{background:linear-gradient(135deg,#FFD700,#FFA500);border-color:#B8860B}
.brick.item-brick{background:linear-gradient(135deg,#90EE90,#228B22);border-color:#006400}
.brick.broken{background:#666;border-color:#444;opacity:.7}
.brick.broken .q{display:none}

/* 道具 */
.item{position:absolute;width:35px;height:35px;display:flex;align-items:center;justify-content:center;font-size:28px;z-index:60;animation:itemPop .5s ease}
@keyframes itemPop{0%{transform:translateY(0)}50%{transform:translateY(-60px)}100%{transform:translateY(0)}}

/* 金币 */
.coin{position:absolute;font-size:24px;z-index:60;animation:coinSpin .6s ease forwards}
@keyframes coinSpin{0%{transform:translateY(0) rotateY(0)}50%{transform:translateY(-80px) rotateY(180deg)}100%{transform:translateY(-40px) rotateY(360deg);opacity:0}}

/* 火球 */
.fireball{position:absolute;width:20px;height:20px;background:#FF4500;border-radius:50%;z-index:90;animation:fireMove 1s linear forwards}
.fireball::after{content:'';position:absolute;inset:-5px;background:rgba(255,69,0,.3);border-radius:50%;animation:fireGlow .3s infinite}
@keyframes fireMove{to{transform:translateX(300px)}}@keyframes fireGlow{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* 怪物 */
.enemy{position:absolute;bottom:40%;width:35px;height:35px;z-index:80}
.enemy .goomba-body{position:absolute;bottom:0;width:35px;height:25px;background:#8B4513;border-radius:15px 15px 5px 5px}
.enemy .goomba-face{position:absolute;bottom:8px;left:8px;width:20px;height:12px;background:#FFE4B5;border-radius:10px}
.enemy .goomba-eye{position:absolute;bottom:14px;width:5px;height:5px;background:#000;border-radius:50%}
.enemy .goomba-eye.left{left:10px}.enemy .goomba-eye.right{left:22px}
.enemy .goomba-brow{position:absolute;bottom:18px;width:8px;height:3px;background:#000}
.enemy .goomba-brow.left{left:8px;transform:rotate(20deg)}.enemy .goomba-brow.right{left:21px;transform:rotate(-20deg)}
.enemy.flat{transform:scaleY(.3);opacity:.7}

/* 单词弹窗 */
.word-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border:5px solid #E86A17;border-radius:20px;padding:30px;text-align:center;z-index:300;box-shadow:0 15px 40px rgba(0,0,0,.5);transition:transform .3s;min-width:350px}
.word-popup.show{transform:translate(-50%,-50%) scale(1)}
.word-popup h2{color:#E86A17;font-size:26px;margin-bottom:15px}
.word-popup .word-en{font-size:42px;font-weight:bold;color:#333;margin:10px 0}
.word-popup .word-pron{color:#888;font-size:18px;margin-bottom:5px}
.word-popup .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.word-popup .choice{padding:15px;font-size:22px;border:3px solid #ddd;border-radius:12px;background:#f9f9f9;cursor:pointer;transition:all .2s}
.word-popup .choice:hover{background:#FFE4B5;border-color:#E86A17;transform:scale(1.05)}
.word-popup .choice.right{background:#90EE90 !important;border-color:#228B22 !important}
.word-popup .choice.wrong{background:#FFB6C1 !important;border-color:#DC143C !important}
.word-popup .feedback{font-size:22px;margin:15px 0;height:30px;font-weight:bold}

/* HUD */
#hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:200;flex-wrap:wrap;gap:5px}
#hud div{background:rgba(0,0,0,.6);color:#fff;padding:8px 15px;border-radius:20px;font-size:16px;font-weight:bold}

/* 屏幕 */
.screen{position:absolute;inset:0;background:linear-gradient(180deg,#5C94FC 55%,#E86A17 55%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;color:#fff;text-align:center;padding:20px}
.screen.hide{display:none}
.screen h1{font-size:42px;text-shadow:3px 3px 0 #E86A17;margin-bottom:15px}
.screen p{font-size:18px;margin-bottom:20px;max-width:450px;line-height:1.8}
.screen .big{font-size:100px;margin:20px 0;animation:bounce 1.2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(5deg)}}
.btn{padding:15px 50px;font-size:24px;border:none;border-radius:50px;background:linear-gradient(135deg,#E86A17,#FF6B35);color:#fff;cursor:pointer;margin:10px;box-shadow:0 6px 20px rgba(232,106,23,.4);transition:all .2s}
.btn:hover{transform:scale(1.08)}
.story{background:rgba(0,0,0,.5);padding:20px;border-radius:15px;margin:15px;max-width:450px}

/* 控制按钮 */
.controls{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;gap:15px}
.ctrl-btn{width:70px;height:70px;background:rgba(255,255,255,.4);border:3px solid rgba(255,255,255,.7);border-radius:50%;font-size:32px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(5px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.ctrl-btn:active{background:rgba(255,255,255,.6);transform:scale(0.9)}
.ctrl-btn.fire-btn{background:rgba(255,69,0,.5);border-color:#FF4500}

/* 状态提示 */
.status-msg{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:bold;color:#FFD700;text-shadow:2px 2px 0 #E86A17;z-index:200;animation:statusPop 2s forwards}
@keyframes statusPop{0%{transform:translateX(-50%) scale(0);opacity:0}20%{transform:translateX(-50%) scale(1.2);opacity:1}80%{transform:translateX(-50%) scale(1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:0}}

/* 关卡提示 */
.level-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:bold;color:#fff;text-shadow:3px 3px 0 #E86A17;z-index:250;animation:hintPop 2s forwards;text-align:center}
@keyframes hintPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}20%{transform:translate(-50%,-50%) scale(1.1);opacity:1}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* 安全区标记 */
.safe-zone{position:absolute;bottom:40%;width:80px;height:10px;background:rgba(0,255,0,.3);border-radius:5px;z-index:5}
</style>
</head>
<body>
<div id="game">

<!-- HUD -->
<div id="hud">
  <div>🍄 超级马里欧单词冒险</div>
  <div>🪙 <span id="coins">0</span></div>
  <div>❤️ <span id="lives">3</span></div>
  <div>⭐ <span id="score">0</span></div>
</div>

<!-- 云朵 -->
<div class="cloud" style="top:10%;animation-duration:20s">☁️</div>
<div class="cloud" style="top:20%;animation-duration:25s;animation-delay:-5s">☁️</div>

<!-- 山 -->
<div class="mountain" style="left:20%">⛰️</div>
<div class="mountain" style="left:60%;font-size:60px">⛰️</div>

<!-- 地面 -->
<div class="ground"></div>

<!-- 马里欧 -->
<div id="mario" class="mario">
  <div class="hat"></div>
  <div class="face"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="nose"></div>
  <div class="mustache"></div>
  <div class="body"></div>
  <div class="overall"></div>
  <div class="strap left"></div>
  <div class="strap right"></div>
  <div class="button left"></div>
  <div class="button right"></div>
  <div class="arm left"></div>
  <div class="arm right"></div>
  <div class="glove left"></div>
  <div class="glove right"></div>
  <div class="leg left"></div>
  <div class="leg right"></div>
  <div class="shoe left"></div>
  <div class="shoe right"></div>
</div>

<!-- 砖块容器 -->
<div id="bricks"></div>

<!-- 怪物容器 -->
<div id="enemies"></div>

<!-- 道具容器 -->
<div id="items"></div>

<!-- 单词弹窗 -->
<div class="word-popup" id="word-popup">
  <h2>🧱 顶到了砖块！</h2>
  <div class="word-pron" id="popup-pron"></div>
  <div class="word-en" id="popup-word"></div>
  <div style="color:#666;margin:10px 0">选择正确的中文意思才能继续冒险！</div>
  <div class="choices" id="popup-choices"></div>
  <div class="feedback" id="popup-feedback"></div>
</div>

<!-- 开始画面 -->
<div class="screen" id="start-screen">
  <h1>🍄 超级马里欧单词冒险</h1>
  <div class="big">🏃</div>
  <div class="story">
    <p>👸 公主被库巴抓走了！</p>
    <p>🏃 马里欧会自动向前跑</p>
    <p>⬆️ 按上键或点击跳跃</p>
    <p>🧱 遇到单词砖要答对才能过</p>
    <p>🍄 顶道具砖获得超能力！</p>
  </div>
  <button class="btn" onclick="startGame()">开始冒险！</button>
</div>

<!-- 结束画面 -->
<div class="screen hide" id="win-screen">
  <h1>🎉 救出公主了！</h1>
  <div class="big">👸💕</div>
  <div class="story">
    <p>马里欧成功救出了公主！</p>
    <p>🪙 金币：<span id="win-coins">0</span></p>
    <p>⭐ 得分：<span id="win-score">0</span></p>
  </div>
  <button class="btn" onclick="startGame()">再玩一次</button>
</div>

<!-- 失败画面 -->
<div class="screen hide" id="fail-screen">
  <h1>😢 游戏结束</h1>
  <div class="big">🐢</div>
  <div class="story">
    <p>马里欧失败了，但不要放弃！</p>
    <p>⭐ 得分：<span id="fail-score">0</span></p>
  </div>
  <button class="btn" onclick="startGame()">重新挑战</button>
</div>

<!-- 控制按钮 -->
<div class="controls">
  <div class="ctrl-btn" onclick="jump()">⬆️</div>
  <div class="ctrl-btn fire-btn hide" id="fire-btn" onclick="shootFire()">🔥</div>
</div>

</div>

<script>
// ========== 音效 ==========
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio(){if(!audioCtx)audioCtx=new AudioContext();return audioCtx}
function playSound(freq,dur,type='square',vol=0.1){
  try{const ctx=getAudio();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}
}
function sfxJump(){playSound(300,0.15,'square',0.08);playSound(450,0.15,'square',0.06)}
function sfxCoin(){playSound(900,0.1,'sine',0.1);setTimeout(()=>playSound(1200,0.1,'sine',0.1),80)}
function sfxHit(){playSound(150,0.1,'square',0.1);playSound(100,0.15,'square',0.1)}
function sfxCorrect(){playSound(523,0.1,'sine',0.12);setTimeout(()=>playSound(659,0.1,'sine',0.12),100);setTimeout(()=>playSound(784,0.2,'sine',0.15),200)}
function sfxWrong(){playSound(200,0.2,'sawtooth',0.1);setTimeout(()=>playSound(150,0.25,'sawtooth',0.1),150)}
function sfxPowerUp(){[300,400,500,600,800].forEach((f,i)=>setTimeout(()=>playSound(f,0.15,'sine',0.12),i*100))}
function sfxFire(){playSound(800,0.1,'sawtooth',0.1);setTimeout(()=>playSound(600,0.15,'sawtooth',0.08),50)}

// ========== 单词库（按难度分级）==========
const WORDS_EASY = [
  {en:'red',cn:'红色',pron:'/red/'},{en:'blue',cn:'蓝色',pron:'/bluː/'},
  {en:'cat',cn:'猫',pron:'/kæt/'},{en:'dog',cn:'狗',pron:'/dɒɡ/'},
  {en:'one',cn:'一',pron:'/wʌn/'},{en:'two',cn:'二',pron:'/tuː/'}
];
const WORDS_MEDIUM = [
  {en:'green',cn:'绿色',pron:'/ɡriːn/'},{en:'yellow',cn:'黄色',pron:'/ˈjel.əʊ/'},
  {en:'bird',cn:'鸟',pron:'/bɜːd/'},{en:'fish',cn:'鱼',pron:'/fɪʃ/'},
  {en:'three',cn:'三',pron:'/θriː/'},{en:'apple',cn:'苹果',pron:'/ˈæp.əl/'}
];
const WORDS_HARD = [
  {en:'banana',cn:'香蕉',pron:'/bəˈnɑː.nə/'},{en:'orange',cn:'橙子',pron:'/ˈɒr.ɪndʒ/'},
  {en:'elephant',cn:'大象',pron:'/ˈel.ɪ.fənt/'},{en:'giraffe',cn:'长颈鹿',pron:'/dʒɪˈrɑːf/'},
  {en:'beautiful',cn:'美丽的',pron:'/ˈbjuː.tɪ.fəl/'},{en:'butterfly',cn:'蝴蝶',pron:'/ˈbʌt.ə.flaɪ/'}
];

// ========== 游戏状态 ==========
let coins=0,score=0,lives=3;
let isBig=false,hasFire=false,isStar=false;
let gameSpeed=2,marioY=0,isJumping=false;
let gameActive=false,gamePaused=false;
let gameLoop=null,spawnTimer=null;
let enemies=[],bricks=[],items=[];
let distance=0,wordBricksHit=0;
let currentLevel=1;
let combo=0,maxCombo=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// ========== 关卡系统（基于CCST方法论）==========
function getLevelConfig(level){
  // 关卡配置：难度递增，引入新元素
  const configs=[
    {speed:2,enemyRate:0.3,brickRate:0.4,words:WORDS_EASY,name:'1-1 新手村',hint:'简单单词，熟悉操作'},
    {speed:2.5,enemyRate:0.5,brickRate:0.5,words:WORDS_EASY.concat(WORDS_MEDIUM.slice(0,3)),name:'1-2 绿草地',hint:'加入中等难度单词'},
    {speed:3,enemyRate:0.6,brickRate:0.6,words:WORDS_MEDIUM,name:'1-3 地下城',hint:'更多怪物，更快节奏'},
    {speed:3.5,enemyRate:0.7,brickRate:0.7,words:WORDS_MEDIUM.concat(WORDS_HARD.slice(0,3)),name:'1-4 天空城',hint:'困难单词出现'},
    {speed:4,enemyRate:0.8,brickRate:0.8,words:WORDS_HARD,name:'🏰 最终城堡',hint:'最难挑战，救出公主!'}
  ];
  return configs[Math.min(level-1,configs.length-1)];
}

function showLevelHint(config){
  const hint=document.createElement('div');
  hint.className='level-hint';
  hint.innerHTML=config.name+'<br><span style="font-size:20px">'+config.hint+'</span>';
  document.getElementById('game').appendChild(hint);
  setTimeout(()=>hint.remove(),2500);
}

// ========== 游戏控制 ==========
function startGame(){
  coins=0;score=0;lives=3;isBig=false;hasFire=false;isStar=false;
  gameSpeed=2;distance=0;wordBricksHit=0;currentLevel=1;combo=0;maxCombo=0;
  enemies=[];bricks=[];items=[];
  gameActive=true;gamePaused=false;
  
  updateHUD();
  updateMario();
  
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hide'));
  document.getElementById('word-popup').classList.remove('show');
  document.getElementById('fire-btn').classList.add('hide');
  
  // 清空容器
  document.getElementById('bricks').innerHTML='';
  document.getElementById('enemies').innerHTML='';
  document.getElementById('items').innerHTML='';
  
  // 显示第一关提示
  showLevelHint(getLevelConfig(1));
  
  // 开始游戏循环
  if(gameLoop)clearInterval(gameLoop);
  gameLoop=setInterval(gameUpdate,20);
  
  // 生成器
  if(spawnTimer)clearInterval(spawnTimer);
  spawnTimer=setInterval(spawnThings,2000);
}

function gameUpdate(){
  if(!gameActive||gamePaused)return;
  
  distance+=gameSpeed;
  
  // 检查是否该进入下一关（每答对3个单词升级）
  if(wordBricksHit>=currentLevel*3&&currentLevel<5){
    currentLevel++;
    const config=getLevelConfig(currentLevel);
    gameSpeed=config.speed;
    showLevelHint(config);
  }
  
  // 移动敌人
  enemies.forEach((e,i)=>{
    e.x-=gameSpeed;
    e.el.style.left=e.x+'px';
    if(e.x<-50){e.el.remove();enemies.splice(i,1)}
    
    // 碰撞检测
    if(!e.dead&&checkCollision(document.getElementById('mario'),e.el)){
      if(isStar){killEnemy(e,i)}
      else if(isJumping&&marioY>0){killEnemy(e,i);score+=100;sfxHit()}
      else{hurtMario()}
    }
  });
  
  // 移动砖块
  bricks.forEach((b,i)=>{
    b.x-=gameSpeed;
    b.el.style.left=b.x+'px';
    if(b.x<-100){b.el.remove();bricks.splice(i,1)}
    
    if(!b.hit&&checkCollision(document.getElementById('mario'),b.el)){
      hitBrick(b,i);
    }
  });
  
  // 移动道具
  items.forEach((item,i)=>{
    item.x-=gameSpeed;
    item.el.style.left=item.x+'px';
    if(item.x<-50){item.el.remove();items.splice(i,1)}
    
    if(checkCollision(document.getElementById('mario'),item.el)){
      getItem(item.type);
      item.el.remove();
      items.splice(i,1);
    }
  });
  
  // 检查胜利（第5关答对3个单词）
  if(currentLevel===5&&wordBricksHit>=12){
    winGame();
  }
}

function spawnThings(){
  if(!gameActive||gamePaused)return;
  
  const config=getLevelConfig(currentLevel);
  const gameW=document.getElementById('game').offsetWidth;
  
  // 随机生成怪物（根据关卡难度）
  if(Math.random()<config.enemyRate){
    spawnEnemy(gameW+50);
  }
  
  // 随机生成砖块
  if(Math.random()<config.brickRate){
    const isWordBrick=Math.random()<0.6;
    if(isWordBrick){
      spawnWordBrick(gameW+50,config.words);
    }else{
      spawnItemBrick(gameW+50);
    }
  }
}

function spawnEnemy(x){
  const enemy=document.createElement('div');
  enemy.className='enemy';
  enemy.innerHTML='<div class="goomba-body"></div><div class="goomba-face"></div><div class="goomba-eye left"></div><div class="goomba-eye right"></div><div class="goomba-brow left"></div><div class="goomba-brow right"></div>';
  enemy.style.left=x+'px';
  document.getElementById('enemies').appendChild(enemy);
  enemies.push({el:enemy,x:x,dead:false});
}

function spawnWordBrick(x,wordPool){
  const brick=document.createElement('div');
  brick.className='brick question';
  brick.innerHTML='<span class="q">?</span>';
  brick.style.left=x+'px';
  document.getElementById('bricks').appendChild(brick);
  
  const word=wordPool[Math.floor(Math.random()*wordPool.length)];
  bricks.push({el:brick,x:x,hit:false,word:word,type:'word'});
}

function spawnItemBrick(x){
  const brick=document.createElement('div');
  brick.className='brick item-brick';
  brick.innerHTML='<span class="q">?</span>';
  brick.style.left=x+'px';
  document.getElementById('bricks').appendChild(brick);
  
  const items=['mushroom','flower','star'];
  const item=items[Math.floor(Math.random()*items.length)];
  bricks.push({el:brick,x:x,hit:false,item:item,type:'item'});
}

function hitBrick(brick,index){
  if(brick.hit)return;
  brick.hit=true;
  brick.el.classList.add('broken');
  sfxHit();
  
  if(brick.type==='word'){
    gamePaused=true;
    showWordPopup(brick.word);
  }else if(brick.type==='item'){
    spawnItem(brick.x,brick.item);
    const coin=document.createElement('div');
    coin.className='coin';
    coin.textContent='🪙';
    coin.style.left=brick.x+'px';
    coin.style.bottom='65%';
    document.getElementById('items').appendChild(coin);
    setTimeout(()=>coin.remove(),600);
    coins++;
    sfxCoin();
  }
  
  updateHUD();
}

function spawnItem(x,type){
  const itemEl=document.createElement('div');
  itemEl.className='item';
  const icons={mushroom:'🍄',flower:'🌸',star:'⭐'};
  itemEl.textContent=icons[type];
  itemEl.style.left=x+'px';
  document.getElementById('items').appendChild(itemEl);
  items.push({el:itemEl,x:x,type:type});
}

function getItem(type){
  sfxPowerUp();
  showStatus('获得'+{mushroom:'蘑菇！变大了！',flower:'花朵！可以喷火！',star:'星星！无敌了！'}[type]);
  
  if(type==='mushroom'){isBig=true;updateMario()}
  else if(type==='flower'){isBig=true;hasFire=true;updateMario();document.getElementById('fire-btn').classList.remove('hide')}
  else if(type==='star'){
    isStar=true;
    document.getElementById('mario').classList.add('star');
    setTimeout(()=>{isStar=false;document.getElementById('mario').classList.remove('star')},5000);
  }
}

function showWordPopup(word){
  const popup=document.getElementById('word-popup');
  document.getElementById('popup-pron').textContent=word.pron;
  document.getElementById('popup-word').textContent=word.en;
  document.getElementById('popup-feedback').textContent='';
  
  // 根据关卡难度决定选项数量
  const optionCount=currentLevel>=4?4:currentLevel>=2?3:2;
  const others=WORDS_EASY.concat(WORDS_MEDIUM).concat(WORDS_HARD).filter(w=>w.en!==word.en);
  const wrongs=shuffle(others).slice(0,optionCount-1).map(w=>w.cn);
  const opts=shuffle([word.cn,...wrongs]);
  
  const choicesDiv=document.getElementById('popup-choices');
  choicesDiv.innerHTML='';
  
  // 根据选项数量调整布局
  if(optionCount<=2){
    choicesDiv.style.gridTemplateColumns='1fr 1fr';
  }else if(optionCount===3){
    choicesDiv.style.gridTemplateColumns='1fr 1fr 1fr';
  }else{
    choicesDiv.style.gridTemplateColumns='1fr 1fr';
  }
  
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=function(){checkAnswer(this,opt,word.cn)};
    choicesDiv.appendChild(btn);
  });
  
  popup.classList.add('show');
}

function checkAnswer(btn,ans,correct){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('popup-feedback');
  
  if(ans===correct){
    btn.classList.add('right');
    combo++;
    if(combo>maxCombo)maxCombo=combo;
    
    const bonus=combo>1?' (连击x'+combo+')':'';
    fb.innerHTML='<span style="color:green">✅ 答对了！'+bonus+'</span>';
    sfxCorrect();
    
    const points=100*combo;
    coins+=10*combo;
    score+=points;
    wordBricksHit++;
    
    if(combo>=3){
      showStatus('🔥 '+combo+'连击！');
    }
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===correct)b.classList.add('right')});
    fb.innerHTML='<span style="color:red">❌ 不对，答案是：'+correct+'</span>';
    sfxWrong();
    combo=0;
    lives--;
  }
  
  updateHUD();
  
  setTimeout(()=>{
    document.getElementById('word-popup').classList.remove('show');
    gamePaused=false;
    if(lives<=0)loseGame();
  },1500);
}

function killEnemy(enemy,index){
  enemy.dead=true;
  enemy.el.classList.add('flat');
  score+=100;
  setTimeout(()=>{enemy.el.remove();enemies.splice(index,1)},500);
}

function hurtMario(){
  if(isStar)return;
  
  if(isBig){
    isBig=false;
    hasFire=false;
    updateMario();
    document.getElementById('fire-btn').classList.add('hide');
    showStatus('变小了！');
  }else{
    lives--;
    showStatus('哎呀！');
    if(lives<=0)loseGame();
  }
  updateHUD();
}

function shootFire(){
  if(!hasFire)return;
  sfxFire();
  const mario=document.getElementById('mario');
  const fireball=document.createElement('div');
  fireball.className='fireball';
  fireball.style.left=(mario.offsetLeft+40)+'px';
  fireball.style.bottom=(40+marioY)+'%';
  document.getElementById('game').appendChild(fireball);
  
  const checkFireHit=setInterval(()=>{
    enemies.forEach((e,i)=>{
      if(!e.dead&&checkCollision(fireball,e.el)){
        killEnemy(e,i);
        fireball.remove();
        clearInterval(checkFireHit);
      }
    });
  },50);
  
  setTimeout(()=>{fireball.remove();clearInterval(checkFireHit)},1000);
}

function jump(){
  if(!gameActive||isJumping||gamePaused)return;
  isJumping=true;
  sfxJump();
  document.getElementById('mario').classList.add('jump');
  marioY=35;
  setTimeout(()=>{marioY=0},250);
  setTimeout(()=>{document.getElementById('mario').classList.remove('jump');isJumping=false},500);
}

function checkCollision(el1,el2){
  const r1=el1.getBoundingClientRect();
  const r2=el2.getBoundingClientRect();
  return!(r1.right<r2.left||r1.left>r2.right||r1.bottom<r2.top||r1.top>r2.bottom);
}

function updateMario(){
  const mario=document.getElementById('mario');
  if(isBig)mario.classList.add('big');
  else mario.classList.remove('big');
}

function updateHUD(){
  document.getElementById('coins').textContent=coins;
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
}

function showStatus(msg){
  const status=document.createElement('div');
  status.className='status-msg';
  status.textContent=msg;
  document.getElementById('game').appendChild(status);
  setTimeout(()=>status.remove(),2000);
}

function winGame(){
  gameActive=false;
  clearInterval(gameLoop);
  clearInterval(spawnTimer);
  sfxCorrect();
  document.getElementById('win-coins').textContent=coins;
  document.getElementById('win-score').textContent=score;
  document.getElementById('win-screen').classList.remove('hide');
}

function loseGame(){
  gameActive=false;
  clearInterval(gameLoop);
  clearInterval(spawnTimer);
  document.getElementById('fail-score').textContent=score;
  document.getElementById('fail-screen').classList.remove('hide');
}

// 键盘控制
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW'){
    e.preventDefault();
    jump();
  }else if(e.code==='KeyF'||e.code==='ControlLeft'){
    e.preventDefault();
    shootFire();
  }
});
</script>
</body>
</html>
