<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍄 马里欧学英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#5C94FC;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px}
#game{width:100%;max-width:500px;background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.3)}

/* 顶部 */
#header{text-align:center;margin-bottom:20px}
#header h1{font-size:28px;color:#E86A17}
#header .mario{font-size:60px;margin:10px 0}
#stats{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:18px}
#stats span{background:#FFE4B5;padding:5px 15px;border-radius:20px}

/* 单词显示 */
#word-box{text-align:center;margin:30px 0;padding:30px;background:#FFF8DC;border-radius:15px;border:3px solid #FFD700}
#word-en{font-size:42px;font-weight:bold;color:#E86A17;margin-bottom:10px}
#word-pron{font-size:18px;color:#888;margin-bottom:5px}
#word-cn-hint{font-size:20px;color:#666}

/* 选项按钮 */
#choices{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
.choice-btn{padding:20px;font-size:22px;border:3px solid #ddd;border-radius:15px;background:#f9f9f9;cursor:pointer;transition:all .2s}
.choice-btn:hover{background:#FFE4B5;border-color:#E86A17;transform:scale(1.05)}
.choice-btn.correct{background:#90EE90 !important;border-color:#228B22 !important}
.choice-btn.wrong{background:#FFB6C1 !important;border-color:#DC143C !important}
.choice-btn:disabled{pointer-events:none;opacity:.8}

/* 反馈 */
#feedback{text-align:center;font-size:24px;margin:15px 0;height:40px;font-weight:bold}
#feedback.correct{color:#228B22}
#feedback.wrong{color:#DC143C}

/* 下一题按钮 */
#next-btn{display:none;width:100%;padding:15px;font-size:22px;border:none;border-radius:15px;background:linear-gradient(135deg,#E86A17,#FF6B35);color:#fff;cursor:pointer;margin-top:15px}
#next-btn:hover{transform:scale(1.02)}

/* 开始画面 */
#start-screen{text-align:center;padding:30px 0}
#start-screen h2{font-size:32px;color:#E86A17;margin-bottom:15px}
#start-screen p{color:#666;margin-bottom:20px;font-size:18px}
.start-btn{padding:15px 40px;font-size:24px;border:none;border-radius:50px;background:linear-gradient(135deg,#E86A17,#FF6B35);color:#fff;cursor:pointer;margin:10px}
.start-btn:hover{transform:scale(1.05)}

/* 结束画面 */
#end-screen{display:none;text-align:center;padding:30px 0}
#end-screen h2{font-size:32px;color:#E86A17;margin-bottom:15px}
#end-screen .emoji{font-size:80px;margin:20px 0}
#end-screen .result{font-size:20px;margin:15px 0;line-height:2}

/* 进度条 */
#progress{width:100%;height:10px;background:#eee;border-radius:5px;margin:15px 0;overflow:hidden}
#progress-bar{height:100%;background:linear-gradient(90deg,#FFD700,#FFA500);border-radius:5px;transition:width .3s}

/* 隐藏 */
.hide{display:none !important}
</style>
</head>
<body>
<div id="game">

<!-- 开始画面 -->
<div id="start-screen">
  <h2>🍄 马里欧学英语</h2>
  <p>选择正确的意思，帮助马里欧顶砖块！</p>
  <div class="mario">🍄</div>
  <button class="start-btn" onclick="startGame()">开始游戏</button>
  <p style="margin-top:20px;color:#888;font-size:14px">适合7岁小朋友 · 共20题</p>
</div>

<!-- 游戏画面 -->
<div id="game-screen" class="hide">
  <div id="header">
    <h1>🍄 马里欧学英语</h1>
    <div id="stats">
      <span>🪙 <b id="coins">0</b></span>
      <span>⭐ <b id="score">0</b>分</span>
      <span>📖 <b id="q-num">1</b>/20</span>
    </div>
  </div>
  
  <div id="progress"><div id="progress-bar" style="width:0%"></div></div>
  
  <div id="word-box">
    <div id="word-pron"></div>
    <div id="word-en"></div>
    <div id="word-cn-hint">这个单词是什么意思？</div>
  </div>
  
  <div id="feedback"></div>
  
  <div id="choices"></div>
  
  <button id="next-btn" onclick="nextQuestion()">下一题 →</button>
</div>

<!-- 结束画面 -->
<div id="end-screen">
  <h2>🎉 游戏结束！</h2>
  <div class="emoji" id="end-emoji">🏆</div>
  <div class="result">
    <div>🪙 获得金币：<b id="end-coins">0</b></div>
    <div>⭐ 总得分：<b id="end-score">0</b></div>
    <div>✅ 答对：<b id="end-correct">0</b> 题</div>
    <div>❌ 答错：<b id="end-wrong">0</b> 题</div>
  </div>
  <button class="start-btn" onclick="startGame()">再玩一次</button>
</div>

</div>

<script>
// 单词库（适合7岁）
const WORDS = [
  {en:'red',cn:'红色',pron:'/red/'},
  {en:'blue',cn:'蓝色',pron:'/bluː/'},
  {en:'green',cn:'绿色',pron:'/ɡriːn/'},
  {en:'yellow',cn:'黄色',pron:'/ˈjel.əʊ/'},
  {en:'one',cn:'一',pron:'/wʌn/'},
  {en:'two',cn:'二',pron:'/tuː/'},
  {en:'three',cn:'三',pron:'/θriː/'},
  {en:'cat',cn:'猫',pron:'/kæt/'},
  {en:'dog',cn:'狗',pron:'/dɒɡ/'},
  {en:'bird',cn:'鸟',pron:'/bɜːd/'},
  {en:'apple',cn:'苹果',pron:'/ˈæp.əl/'},
  {en:'banana',cn:'香蕉',pron:'/bəˈnɑː.nə/'},
  {en:'head',cn:'头',pron:'/hed/'},
  {en:'eye',cn:'眼睛',pron:'/aɪ/'},
  {en:'hand',cn:'手',pron:'/hænd/'},
  {en:'run',cn:'跑',pron:'/rʌn/'},
  {en:'jump',cn:'跳',pron:'/dʒʌmp/'},
  {en:'eat',cn:'吃',pron:'/iːt/'},
  {en:'father',cn:'爸爸',pron:'/ˈfɑː.ðər/'},
  {en:'mother',cn:'妈妈',pron:'/ˈmʌð.ər/'}
];

let currentQ = 0;
let coins = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let currentWord = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  currentQ = 0;
  coins = 0;
  score = 0;
  correct = 0;
  wrong = 0;
  
  document.getElementById('start-screen').classList.add('hide');
  document.getElementById('end-screen').classList.add('hide');
  document.getElementById('game-screen').classList.remove('hide');
  
  showQuestion();
}

function showQuestion() {
  currentWord = WORDS[currentQ];
  
  // 更新显示
  document.getElementById('word-en').textContent = currentWord.en;
  document.getElementById('word-pron').textContent = currentWord.pron;
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('next-btn').style.display = 'none';
  
  // 进度条
  document.getElementById('progress-bar').style.width = ((currentQ / WORDS.length) * 100) + '%';
  
  // 生成选项（1正确+3错误）
  const otherWords = WORDS.filter(w => w.en !== currentWord.en);
  const wrongOptions = shuffle(otherWords).slice(0, 3).map(w => w.cn);
  const options = shuffle([currentWord.cn, ...wrongOptions]);
  
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, btn);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(selected, btn) {
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => b.disabled = true);
  
  const feedback = document.getElementById('feedback');
  
  if (selected === currentWord.cn) {
    // 答对了！
    btn.classList.add('correct');
    feedback.textContent = '✅ 太棒了！+10金币 +100分';
    feedback.className = 'correct';
    coins += 10;
    score += 100;
    correct++;
  } else {
    // 答错了
    btn.classList.add('wrong');
    // 显示正确答案
    buttons.forEach(b => {
      if (b.textContent === currentWord.cn) b.classList.add('correct');
    });
    feedback.textContent = '❌ 不对哦，正确答案是：' + currentWord.cn;
    feedback.className = 'wrong';
    wrong++;
  }
  
  // 更新统计
  document.getElementById('coins').textContent = coins;
  document.getElementById('score').textContent = score;
  
  // 显示下一题按钮
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= WORDS.length) {
    showEnd();
  } else {
    showQuestion();
  }
}

function showEnd() {
  document.getElementById('game-screen').classList.add('hide');
  document.getElementById('end-screen').classList.remove('hide');
  
  document.getElementById('end-coins').textContent = coins;
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-correct').textContent = correct;
  document.getElementById('end-wrong').textContent = wrong;
  
  // 根据表现显示不同表情
  const emoji = document.getElementById('end-emoji');
  if (wrong === 0) emoji.textContent = '🏆';
  else if (wrong <= 3) emoji.textContent = '😊';
  else if (wrong <= 6) emoji.textContent = '😐';
  else emoji.textContent = '😢';
}
</script>
</body>
</html>
