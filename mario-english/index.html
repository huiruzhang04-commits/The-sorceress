<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍄 马里欧单词大冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#5C94FC;overflow:hidden;touch-action:none;user-select:none}

#game{width:100%;max-width:900px;height:100vh;margin:0 auto;position:relative;background:linear-gradient(180deg,#5C94FC 65%,#E86A17 65%);overflow:hidden}

/* 云朵 */
.cloud{position:absolute;font-size:50px;opacity:.7;animation:cloudMove linear infinite}
@keyframes cloudMove{from{left:-100px}to{left:100%}}

/* 地面 */
.ground{position:absolute;bottom:0;width:100%;height:35%;background:linear-gradient(180deg,#E86A17,#8B4513);border-top:4px solid #5C3317}
.ground::before{content:'';position:absolute;top:0;left:0;right:0;height:15px;background-image:repeating-linear-gradient(90deg,transparent,transparent 25px,#5C3317 25px,#5C3317 28px)}

/* 马里欧 */
#mario{position:absolute;bottom:35%;left:100px;font-size:45px;z-index:50;transition:left .3s;cursor:pointer}
#mario.jump{animation:marioJump .4s ease}
#mario.big{font-size:55px}
@keyframes marioJump{0%,100%{transform:translateY(0) scaleY(1)}40%{transform:translateY(-180px) scaleY(1.1)}60%{transform:translateY(-180px) scaleY(0.9)}}

/* 砖块 */
.brick{position:absolute;width:55px;height:55px;border:3px solid;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;z-index:10;font-weight:bold;font-size:22px;animation:brickFloat 2s ease-in-out infinite}
.brick:active{transform:translateY(4px) scale(0.95)}
@keyframes brickFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.brick.question{background:linear-gradient(135deg,#FFD700,#FFA500);border-color:#B8860B;color:#8B4513}
.brick.normal{background:linear-gradient(135deg,#B85C38,#8B4513);border-color:#5C3317;animation:none}
.brick.hit{background:#666;border-color:#444;pointer-events:none;animation:none}

/* 金币 */
.coin-pop{position:absolute;font-size:28px;animation:coinUp .6s ease-out forwards;z-index:60}
@keyframes coinUp{0%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-80px) scale(1.3)}100%{transform:translateY(-120px) scale(0.8);opacity:0}}

/* 怪物 */
.enemy{position:absolute;bottom:35%;font-size:35px;z-index:40;animation:enemyWalk 4s linear infinite}
@keyframes enemyWalk{0%{left:100%}100%{left:-50px}}

/* 道具 */
.item{position:absolute;font-size:35px;z-index:45;animation:itemBounce 1s ease-in-out infinite}
@keyframes itemBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

/* 弹窗 */
.popup{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border:5px solid #E86A17;border-radius:20px;padding:25px;text-align:center;z-index:200;box-shadow:0 15px 40px rgba(0,0,0,.5);transition:transform .3s;min-width:320px;max-width:90%}
.popup.show{transform:translate(-50%,-50%) scale(1)}
.popup h3{color:#E86A17;font-size:22px;margin-bottom:8px}
.popup .word-en{font-size:38px;font-weight:bold;color:#333;margin:8px 0}
.popup .word-pron{color:#888;font-size:15px;margin-bottom:5px}
.popup .hint{color:#666;font-size:16px;margin-bottom:12px}
.popup .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0}
.popup .choice{padding:14px;font-size:20px;border:3px solid #ddd;border-radius:12px;background:#f9f9f9;cursor:pointer;transition:all .2s}
.popup .choice:hover{background:#FFE4B5;border-color:#E86A17;transform:scale(1.05)}
.popup .choice.right{background:#90EE90 !important;border-color:#228B22 !important;color:#006400}
.popup .choice.wrong{background:#FFB6C1 !important;border-color:#DC143C !important;color:#8B0000}
.popup .feedback{font-size:20px;margin:12px 0;height:30px;font-weight:bold}
.popup .timer-bar{height:6px;background:#eee;border-radius:3px;margin:10px 0;overflow:hidden}
.popup .timer-fill{height:100%;background:linear-gradient(90deg,#4CAF50,#FFD700,#FF5722);border-radius:3px;transition:width 1s linear}

/* HUD */
#hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:150;flex-wrap:wrap;gap:5px}
#hud div{background:rgba(0,0,0,.6);color:#fff;padding:6px 12px;border-radius:15px;font-size:15px;font-weight:bold}
#hud .time{color:#FFD700}

/* 屏幕 */
.screen{position:absolute;inset:0;background:linear-gradient(180deg,#5C94FC 55%,#E86A17 55%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;color:#fff;text-align:center;padding:20px}
.screen.hide{display:none}
.screen h1{font-size:40px;text-shadow:3px 3px 0 #E86A17;margin-bottom:10px}
.screen p{font-size:17px;margin-bottom:15px;opacity:.9;max-width:400px;line-height:1.6}
.screen .big{font-size:90px;margin:15px 0;animation:bounce 1.2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-15px) rotate(-5deg)}75%{transform:translateY(-15px) rotate(5deg)}}
.btn{padding:14px 45px;font-size:22px;border:none;border-radius:50px;background:linear-gradient(135deg,#E86A17,#FF6B35);color:#fff;cursor:pointer;margin:8px;box-shadow:0 6px 20px rgba(232,106,23,.4);transition:all .2s}
.btn:hover{transform:scale(1.08);box-shadow:0 8px 25px rgba(232,106,23,.6)}
.story{background:rgba(0,0,0,.5);padding:18px;border-radius:15px;margin:12px;max-width:420px}
.story p{margin:8px 0;font-size:16px}

/* 连击 */
#combo{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:bold;color:#FFD700;text-shadow:2px 2px 0 #E86A17;z-index:150;opacity:0;transition:opacity .3s}
#combo.show{opacity:1}

/* 方向键 */
.controls{position:absolute;bottom:10px;left:10px;z-index:150;display:flex;gap:10px}
.ctrl-btn{width:55px;height:55px;background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.5);border-radius:50%;font-size:24px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(5px)}
.ctrl-btn:active{background:rgba(255,255,255,.5);transform:scale(0.9)}

/* 公主 */
.princess{position:absolute;bottom:35%;right:80px;font-size:50px;z-index:40;animation:princessIdle 2s ease-in-out infinite}
@keyframes princessIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px) rotate(5deg)}}

/* 库巴 */
.bowser{position:absolute;bottom:35%;right:30px;font-size:55px;z-index:40;animation:bowserIdle 1.5s ease-in-out infinite}
@keyframes bowserIdle{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-8px) scaleX(1.05)}}
</style>
</head>
<body>
<div id="game">

<!-- HUD -->
<div id="hud">
  <div>🍄 单词冒险</div>
  <div>🪙 <span id="coins">0</span></div>
  <div>❤️ <span id="lives">3</span></div>
  <div>⭐ <span id="score">0</span></div>
  <div class="time">⏱️ <span id="time">60</span>秒</div>
</div>
<div id="combo"></div>

<!-- 云朵 -->
<div class="cloud" style="top:8%;animation-duration:30s">☁️</div>
<div class="cloud" style="top:18%;animation-duration:25s;animation-delay:-8s">☁️</div>
<div class="cloud" style="top:12%;animation-duration:35s;animation-delay:-15s">☁️</div>

<!-- 地面 -->
<div class="ground"></div>

<!-- 马里欧 -->
<div id="mario">🏃</div>

<!-- 公主（通关显示） -->
<div class="princess" id="princess" style="display:none">👸</div>

<!-- 库巴（失败显示） -->
<div class="bowser" id="bowser" style="display:none">🐢</div>

<!-- 砖块 -->
<div id="bricks"></div>

<!-- 怪物 -->
<div id="enemies"></div>

<!-- 弹窗 -->
<div class="popup" id="popup">
  <h3>🧱 顶到了砖块！</h3>
  <div class="word-pron" id="popup-pron"></div>
  <div class="word-en" id="popup-word"></div>
  <div class="hint">这个单词是什么意思？</div>
  <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  <div class="choices" id="popup-choices"></div>
  <div class="feedback" id="popup-feedback"></div>
</div>

<!-- 开始画面 -->
<div class="screen" id="start-screen">
  <h1>🍄 马里欧单词大冒险</h1>
  <div class="big">🏃</div>
  <div class="story">
    <p>👸 公主被库巴抓走了！</p>
    <p>🏃 控制马里欧移动跳跃</p>
    <p>🧱 顶碎问号砖学单词</p>
    <p>⚡ 答对救出公主！</p>
    <p>💡 键盘：← → 移动，↑ 跳跃/顶砖</p>
  </div>
  <button class="btn" onclick="startGame()">开始冒险！</button>
</div>

<!-- 结束画面 -->
<div class="screen hide" id="win-screen">
  <h1>🎉 救出公主了！</h1>
  <div class="big">👸💕🏃</div>
  <div class="story">
    <p>马里欧成功打败了库巴！</p>
    <p>🪙 金币：<span id="win-coins">0</span></p>
    <p>⭐ 得分：<span id="win-score">0</span></p>
    <p>🔥 最高连击：<span id="win-combo">0</span></p>
  </div>
  <button class="btn" onclick="startGame()">再玩一次</button>
</div>

<!-- 失败画面 -->
<div class="screen hide" id="fail-screen">
  <h1>😢 被库巴打败了</h1>
  <div class="big">🐢</div>
  <div class="story">
    <p>马里欧失败了...</p>
    <p>不要放弃，公主在等你！</p>
    <p>⭐ 得分：<span id="fail-score">0</span></p>
  </div>
  <button class="btn" onclick="startGame()">重新挑战</button>
</div>

<!-- 方向键（移动端） -->
<div class="controls">
  <div class="ctrl-btn" onclick="moveMario(-1)">⬅️</div>
  <div class="ctrl-btn" onclick="jumpMario()">⬆️</div>
  <div class="ctrl-btn" onclick="moveMario(1)">➡️</div>
</div>

</div>

<script>
// ========== 音效系统 ==========
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function playSound(freq, duration, type = 'square', volume = 0.1) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function sfxJump() { playSound(300, 0.15, 'square', 0.08); playSound(450, 0.15, 'square', 0.06); }
function sfxCoin() { playSound(900, 0.1, 'sine', 0.1); setTimeout(() => playSound(1200, 0.1, 'sine', 0.1), 80); }
function sfxCorrect() { playSound(523, 0.1, 'sine', 0.12); setTimeout(() => playSound(659, 0.1, 'sine', 0.12), 100); setTimeout(() => playSound(784, 0.2, 'sine', 0.15), 200); }
function sfxWrong() { playSound(200, 0.2, 'sawtooth', 0.1); setTimeout(() => playSound(150, 0.25, 'sawtooth', 0.1), 150); }
function sfxHit() { playSound(150, 0.1, 'square', 0.1); playSound(100, 0.15, 'square', 0.1); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.15, 'sine', 0.12), i * 150));
}

// ========== 单词库 ==========
const WORDS = [
  {en:'red', cn:'红色', pron:'/red/'}, {en:'blue', cn:'蓝色', pron:'/bluː/'},
  {en:'green', cn:'绿色', pron:'/ɡriːn/'}, {en:'yellow', cn:'黄色', pron:'/ˈjel.əʊ/'},
  {en:'one', cn:'一', pron:'/wʌn/'}, {en:'two', cn:'二', pron:'/tuː/'},
  {en:'three', cn:'三', pron:'/θriː/'}, {en:'cat', cn:'猫', pron:'/kæt/'},
  {en:'dog', cn:'狗', pron:'/dɒɡ/'}, {en:'bird', cn:'鸟', pron:'/bɜːd/'},
  {en:'apple', cn:'苹果', pron:'/ˈæp.əl/'}, {en:'banana', cn:'香蕉', pron:'/bəˈnɑː.nə/'},
  {en:'head', cn:'头', pron:'/hed/'}, {en:'eye', cn:'眼睛', pron:'/aɪ/'},
  {en:'hand', cn:'手', pron:'/hænd/'}, {en:'run', cn:'跑', pron:'/rʌn/'}
];

// ========== 游戏状态 ==========
let coins = 0, score = 0, lives = 3, combo = 0, maxCombo = 0;
let marioX = 100, marioY = 0, isJumping = false;
let timeLeft = 60, timerInterval = null, answerTimer = null;
let currentWord = null, answeredCount = 0;
let gameActive = false;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========== 游戏控制 ==========
function startGame() {
  coins = 0; score = 0; lives = 3; combo = 0; maxCombo = 0;
  marioX = 100; marioY = 0; isJumping = false;
  timeLeft = 60; answeredCount = 0; gameActive = true;
  
  updateHUD();
  document.getElementById('combo').classList.remove('show');
  
  // 隐藏所有画面
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hide'));
  document.getElementById('popup').classList.remove('show');
  document.getElementById('princess').style.display = 'none';
  document.getElementById('bowser').style.display = 'none';
  
  // 生成砖块
  const bricksDiv = document.getElementById('bricks');
  bricksDiv.innerHTML = '';
  const shuffled = shuffle([...WORDS]);
  shuffled.forEach((word, i) => {
    const brick = document.createElement('div');
    brick.className = 'brick question';
    brick.style.left = (10 + i * 5.5) + '%';
    brick.style.bottom = (38 + (i % 3) * 12) + '%';
    brick.style.animationDelay = (i * 0.2) + 's';
    brick.innerHTML = '?';
    brick.dataset.word = JSON.stringify(word);
    brick.dataset.index = i;
    brick.onclick = () => hitBrick(brick);
    bricksDiv.appendChild(brick);
  });
  
  // 生成怪物
  const enemiesDiv = document.getElementById('enemies');
  enemiesDiv.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const enemy = document.createElement('div');
    enemy.className = 'enemy';
    enemy.textContent = ['🐢', '🍄', '👻'][i];
    enemy.style.animationDuration = (3 + i) + 's';
    enemy.style.animationDelay = (i * 1.5) + 's';
    enemy.style.bottom = (35 + Math.random() * 5) + '%';
    enemiesDiv.appendChild(enemy);
  }
  
  // 重置马里欧位置
  updateMarioPos();
  
  // 开始计时
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameActive) return;
    timeLeft--;
    document.getElementById('time').textContent = timeLeft;
    if (timeLeft <= 0) {
      gameOver(false);
    }
  }, 1000);
}

function moveMario(dir) {
  if (!gameActive || isJumping) return;
  marioX += dir * 60;
  marioX = Math.max(20, Math.min(marioX, window.innerWidth - 100));
  updateMarioPos();
}

function jumpMario() {
  if (!gameActive || isJumping) return;
  isJumping = true;
  sfxJump();
  
  const mario = document.getElementById('mario');
  mario.classList.add('jump');
  
  // 检查是否顶到砖块
  setTimeout(() => checkBrickHit(), 200);
  
  setTimeout(() => {
    mario.classList.remove('jump');
    isJumping = false;
  }, 400);
}

function updateMarioPos() {
  document.getElementById('mario').style.left = marioX + 'px';
}

function checkBrickHit() {
  const marioRect = document.getElementById('mario').getBoundingClientRect();
  const bricks = document.querySelectorAll('.brick:not(.hit)');
  
  bricks.forEach(brick => {
    const rect = brick.getBoundingClientRect();
    if (marioRect.left < rect.right && marioRect.right > rect.left &&
        marioRect.top < rect.bottom && marioRect.bottom > rect.top) {
      hitBrick(brick);
    }
  });
}

function hitBrick(brick) {
  if (!gameActive || brick.classList.contains('hit')) return;
  
  sfxHit();
  brick.classList.add('hit');
  brick.innerHTML = '';
  
  // 金币弹出
  const coin = document.createElement('div');
  coin.className = 'coin-pop';
  coin.textContent = '🪙';
  brick.appendChild(coin);
  setTimeout(() => coin.remove(), 600);
  
  // 显示单词
  const word = JSON.parse(brick.dataset.word);
  showWordPopup(word);
}

function showWordPopup(word) {
  currentWord = word;
  gameActive = false;
  
  const popup = document.getElementById('popup');
  document.getElementById('popup-pron').textContent = word.pron;
  document.getElementById('popup-word').textContent = word.en;
  document.getElementById('popup-feedback').textContent = '';
  document.getElementById('timer-fill').style.width = '100%';
  
  // 生成选项
  const others = WORDS.filter(w => w.en !== word.en);
  const wrongs = shuffle(others).slice(0, 3).map(w => w.cn);
  const opts = shuffle([word.cn, ...wrongs]);
  
  const choicesDiv = document.getElementById('popup-choices');
  choicesDiv.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = opt;
    btn.onclick = function() { checkAnswer(this, opt); };
    choicesDiv.appendChild(btn);
  });
  
  popup.classList.add('show');
  
  // 答题倒计时
  let time = 100;
  if (answerTimer) clearInterval(answerTimer);
  answerTimer = setInterval(() => {
    time -= 2;
    document.getElementById('timer-fill').style.width = time + '%';
    if (time <= 0) {
      clearInterval(answerTimer);
      timeUp();
    }
  }, 100);
}

function timeUp() {
  document.querySelectorAll('.choice').forEach(b => {
    b.disabled = true;
    if (b.textContent === currentWord.cn) b.classList.add('right');
  });
  document.getElementById('popup-feedback').innerHTML = '<span style="color:red">⏰ 时间到！答案是：' + currentWord.cn + '</span>';
  combo = 0;
  lives--;
  updateHUD();
  
  setTimeout(() => {
    document.getElementById('popup').classList.remove('show');
    if (lives <= 0) gameOver(false);
    else { gameActive = true; answeredCount++; checkWin(); }
  }, 1500);
}

function checkAnswer(btn, ans) {
  clearInterval(answerTimer);
  document.querySelectorAll('.choice').forEach(b => b.disabled = true);
  const fb = document.getElementById('popup-feedback');
  
  if (ans === currentWord.cn) {
    btn.classList.add('right');
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    
    const bonus = combo > 1 ? ' (连击x' + combo + '!)' : '';
    fb.innerHTML = '<span style="color:green">✅ 答对了！' + bonus + '</span>';
    sfxCorrect();
    
    const points = 100 * combo;
    coins += 10 * combo;
    score += points;
    
    // 显示连击
    if (combo >= 2) {
      const comboDiv = document.getElementById('combo');
      comboDiv.textContent = '🔥 ' + combo + '连击！';
      comboDiv.classList.add('show');
    }
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b => {
      if (b.textContent === currentWord.cn) b.classList.add('right');
    });
    fb.innerHTML = '<span style="color:red">❌ 不对，答案是：' + currentWord.cn + '</span>';
    sfxWrong();
    combo = 0;
    document.getElementById('combo').classList.remove('show');
    lives--;
  }
  
  updateHUD();
  answeredCount++;
  
  setTimeout(() => {
    document.getElementById('popup').classList.remove('show');
    if (lives <= 0) gameOver(false);
    else checkWin();
  }, 1500);
}

function checkWin() {
  const remaining = document.querySelectorAll('.brick:not(.hit)');
  if (remaining.length === 0 || answeredCount >= WORDS.length) {
    gameOver(true);
  } else {
    gameActive = true;
  }
}

function gameOver(win) {
  gameActive = false;
  clearInterval(timerInterval);
  clearInterval(answerTimer);
  
  if (win) {
    sfxWin();
    document.getElementById('princess').style.display = 'block';
    document.getElementById('win-coins').textContent = coins;
    document.getElementById('win-score').textContent = score;
    document.getElementById('win-combo').textContent = maxCombo;
    setTimeout(() => document.getElementById('win-screen').classList.remove('hide'), 1000);
  } else {
    document.getElementById('bowser').style.display = 'block';
    document.getElementById('fail-score').textContent = score;
    setTimeout(() => document.getElementById('fail-screen').classList.remove('hide'), 500);
  }
}

function updateHUD() {
  document.getElementById('coins').textContent = coins;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
}

// ========== 键盘控制 ==========
document.addEventListener('keydown', e => {
  if (!gameActive) return;
  switch(e.code) {
    case 'ArrowLeft': case 'KeyA': e.preventDefault(); moveMario(-1); break;
    case 'ArrowRight': case 'KeyD': e.preventDefault(); moveMario(1); break;
    case 'ArrowUp': case 'Space': case 'KeyW': e.preventDefault(); jumpMario(); break;
  }
});

// 点击马里欧也可以跳跃
document.getElementById('mario').onclick = () => jumpMario();
</script>
</body>
</html>
