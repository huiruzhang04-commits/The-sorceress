<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍄 超级马里欧单词冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Microsoft YaHei',sans-serif;background:#5C94FC;touch-action:none;user-select:none}

#game{width:100%;height:100%;position:relative;overflow:hidden}

/* ========== 背景层 ========== */
.sky{position:absolute;inset:0;background:linear-gradient(180deg,#5C94FC 0%,#87CEEB 55%,#E86A17 55%,#8B4513 100%)}
.sun{position:absolute;top:5%;right:10%;width:50px;height:50px;background:#FFD700;border-radius:50%;box-shadow:0 0 30px #FFD700;animation:sunPulse 3s ease infinite}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.cloud{position:absolute;opacity:.8;pointer-events:none}
.cloud-1{top:8%;animation:cloudMove1 35s linear infinite}
.cloud-2{top:12%;animation:cloudMove2 45s linear infinite;animation-delay:-20s;opacity:.6}
.cloud-3{top:6%;animation:cloudMove1 50s linear infinite;animation-delay:-10s;opacity:.5}
@keyframes cloudMove1{from{left:100%}to{left:-200px}}
@keyframes cloudMove2{from{left:100%}to{left:-150px}}

/* 远景山 */
.mountain{position:absolute;bottom:15%;width:120px;height:80px;background:linear-gradient(135deg,#228B22 0%,#006400 100%);clip-path:polygon(50% 0%,100% 100%,0% 100%);opacity:.6}

/* 地面 - 使用精灵图 */
.ground{position:absolute;bottom:0;width:300%;height:15%;background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABCSURBVFiF7c4xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==') repeat-x;background-size:32px 32px;animation:groundMove 2s linear infinite}
@keyframes groundMove{from{transform:translateX(0)}to{transform:translateX(-32px)}}

/* 砖块样式 - 像素风 */
.brick{position:absolute;width:40px;height:40px;z-index:50}
.brick-question{background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABGSURBVFiF7c0xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==');background-size:cover;border:2px solid #B8860B;border-radius:2px;animation:brickFloat 2s ease infinite}
.brick-normal{background:linear-gradient(135deg,#D2691E 0%,#8B4513 50%,#A0522D 100%);border:2px solid #654321;border-radius:2px;box-shadow:inset 2px 2px 0 rgba(255,255,255,.2),inset -2px -2px 0 rgba(0,0,0,.3)}
.brick-item{background:linear-gradient(135deg,#90EE90,#228B22);border:2px solid #006400;border-radius:2px}
@keyframes brickFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.brick.hit{transform:scale(.9);opacity:.5}

/* 砖块高度 */
.brick-h1{bottom:28%}
.brick-h2{bottom:38%}
.brick-h3{bottom:48%}

/* ========== 马里欧 - 使用CSS像素艺术 ========== */
.mario{position:absolute;bottom:15%;left:15%;width:32px;height:32px;z-index:100;image-rendering:pixelated}


.mario.big{width:40px;height:40px}
.mario.star{animation:starFlash .15s infinite}
@keyframes starFlash{0%,100%{filter:brightness(1) hue-rotate(0)}50%{filter:brightness(1.5) hue-rotate(60deg)}}

/* 无敌闪亮效果 */
.mario.invincible{animation:invincibleShine .3s infinite}
@keyframes invincibleShine{0%,100%{filter:brightness(1.3) hue-rotate(0deg)}50%{filter:brightness(1.5) hue-rotate(30deg)}}

/* 马里欧像素精灵 - 使用box-shadow绘制 */
.mario-sprite{width:2px;height:2px;background:transparent;position:absolute;top:0;left:0;
  box-shadow:
    /* 第0行 - 帽子 */
    8px 0 #E70012, 10px 0 #E70012, 12px 0 #E70012, 14px 0 #E70012,
    /* 第1行 - 帽子 */
    6px 2px #E70012, 8px 2px #E70012, 10px 2px #E70012, 12px 2px #E70012, 14px 2px #E70012, 16px 2px #E70012,
    /* 第2行 - 头发+脸 */
    6px 4px #6B3F00, 8px 4px #6B3F00, 14px 4px #FFCFA8, 16px 4px #FFCFA8,
    /* 第3行 - 头发+脸 */
    4px 6px #6B3F00, 6px 6px #6B3F00, 8px 6px #FFCFA8, 10px 6px #FFCFA8, 12px 6px #FFCFA8, 14px 6px #FFCFA8, 16px 6px #FFCFA8,
    /* 第4行 - 眼睛 */
    8px 8px #000, 12px 8px #000,
    /* 第5行 - 鼻子 */
    10px 10px #FFCFA8, 12px 10px #FFCFA8,
    /* 第6行 - 胡子 */
    6px 12px #000, 8px 12px #000, 10px 12px #000, 12px 12px #000, 14px 12px #000,
    /* 第7行 - 身体 */
    4px 14px #E70012, 6px 14px #E70012, 8px 14px #0045AD, 10px 14px #E70012, 12px 14px #E70012, 14px 14px #0045AD,
    /* 第8行 - 身体 */
    2px 16px #E70012, 4px 16px #E70012, 6px 16px #E70012, 8px 16px #0045AD, 10px 16px #E70012, 12px 16px #E70012, 14px 16px #0045AD, 16px 16px #E70012,
    /* 第9行 - 裤子 */
    4px 18px #0045AD, 6px 18px #0045AD, 8px 18px #0045AD, 10px 18px #0045AD, 12px 18px #0045AD, 14px 18px #0045AD,
    /* 第10行 - 鞋子 */
    2px 22px #6B3F00, 4px 22px #6B3F00, 12px 22px #6B3F00, 14px 22px #6B3F00,
    /* 第11行 - 鞋子 */
    0px 24px #6B3F00, 2px 24px #6B3F00, 4px 24px #6B3F00, 12px 24px #6B3F00, 14px 24px #6B3F00, 16px 24px #6B3F00
}

/* 大马里欧 */
.mario.big .mario-sprite{transform:scale(1.25);transform-origin:top left;}

/* 跑步动画帧 */
.mario.running .mario-sprite{animation:runCycle .3s steps(2) infinite}
@keyframes runCycle{
  0%{transform:translateX(0)}
  50%{transform:translateX(-2px)}
  100%{transform:translateX(0)}
}

/* ========== 怪物 ========== */
.enemy{position:absolute;bottom:15%;width:32px;height:32px;z-index:80}
.enemy-goomba{background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABGSURBVFiF7c0xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==');background-size:cover;image-rendering:pixelated}
.enemy-koopa{background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABGSURBVFiF7c0xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==');background-size:cover;image-rendering:pixelated}
.enemy.flat{transform:scaleY(.3);opacity:.5;transition:transform .3s}

/* ========== 道具 ========== */
.item{position:absolute;width:32px;height:32px;z-index:60;animation:itemPop .5s ease}
@keyframes itemPop{0%{transform:translateY(0) scale(.5)}50%{transform:translateY(-60px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
.item-mushroom{background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABGSURBVFiF7c0xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==');background-size:cover;image-rendering:pixelated}
.item-flower{background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABGSURBVFiF7c0xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==');background-size:cover;image-rendering:pixelated}
.item-star{background:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABGSURBVFiF7c0xEQAgDAAxhPafmtIBCfh3k+4mW3DNNVdcccUVV1xxxRVXXHHFFVdcccUVV1xxxRVXXHHFFVdcccUVV1z5zQdJ9wN9pynv8wAAAABJRU5ErkJggg==');background-size:cover;image-rendering:pixelated}

/* ========== 金币 ========== */
.coin{position:absolute;width:24px;height:24px;z-index:60;animation:coinSpin .8s ease forwards}
@keyframes coinSpin{0%{transform:translateY(0) scale(1)}50%{transform:translateY(-80px) scale(1.2)}100%{transform:translateY(-20px) scale(0);opacity:0}}

/* ========== 火球 ========== */
.fireball{position:absolute;width:16px;height:16px;background:#FF4500;border-radius:50%;z-index:90;animation:fireMove .8s linear forwards;box-shadow:0 0 10px #FF4500}
@keyframes fireMove{to{transform:translateX(300px)}}

/* ========== HUD ========== */
#hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:200;flex-wrap:wrap;gap:5px}
#hud div{background:rgba(0,0,0,.6);color:#fff;padding:8px 12px;border-radius:20px;font-size:14px;font-weight:bold}

/* ========== 单词弹窗 ========== */
.word-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border:4px solid #E86A17;border-radius:20px;padding:25px;text-align:center;z-index:300;box-shadow:0 10px 40px rgba(0,0,0,.4);transition:transform .3s;min-width:320px;max-width:90vw}
.word-popup.show{transform:translate(-50%,-50%) scale(1)}
.word-popup h2{color:#E86A17;font-size:22px;margin-bottom:10px}
.word-popup .word-en{font-size:36px;font-weight:bold;color:#333;margin:10px 0}
.word-popup .word-pron{color:#888;font-size:16px}
.word-popup .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.word-popup .choice{padding:14px;font-size:18px;border:2px solid #ddd;border-radius:10px;background:#f9f9f9;cursor:pointer;transition:all .2s}
.word-popup .choice:hover{background:#FFE4B5;border-color:#E86A17}
.word-popup .choice.right{background:#90EE90 !important;border-color:#228B22 !important}
.word-popup .choice.wrong{background:#FFB6C1 !important;border-color:#DC143C !important}
.word-popup .feedback{font-size:18px;margin:10px 0;height:28px}

/* ========== 屏幕 ========== */
.screen{position:fixed;inset:0;background:linear-gradient(180deg,#5C94FC 50%,#87CEEB 55%,#E86A17 55%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;color:#fff;text-align:center;padding:20px;overflow-y:auto}
.screen.hide{display:none}
.screen h1{font-size:32px;text-shadow:2px 2px 0 #E86A17;margin-bottom:15px}
.screen p{font-size:16px;margin-bottom:15px;max-width:400px;line-height:1.6}
.screen .big{font-size:80px;margin:15px 0;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.btn{padding:15px 40px;font-size:22px;border:none;border-radius:30px;background:linear-gradient(135deg,#E86A17,#FF6B35);color:#fff;cursor:pointer;margin:8px;box-shadow:0 5px 20px rgba(232,106,23,.4);transition:all .2s;font-weight:bold}
.btn:hover{transform:scale(1.05)}
.story{background:rgba(0,0,0,.5);padding:20px;border-radius:15px;margin:10px;max-width:400px}

/* ========== 控制按钮 ========== */
.controls{position:fixed;bottom:15px;left:0;right:0;z-index:500;display:flex;justify-content:space-between;padding:0 15px;pointer-events:none}
.ctrl-btn{width:55px;height:55px;background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.6);border-radius:50%;font-size:24px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);pointer-events:auto}
.ctrl-btn:active,.ctrl-btn.active{background:rgba(255,255,255,.5);transform:scale(0.9)}
.ctrl-btn.fire-btn{background:rgba(255,69,0,.5);border-color:#FF4500}

/* ========== 状态提示 ========== */
.status-msg{position:fixed;top:80px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:bold;color:#FFD700;text-shadow:2px 2px 0 #E86A17;z-index:200;animation:statusPop 2s forwards}
@keyframes statusPop{0%{transform:translateX(-50%) scale(0)}20%{transform:translateX(-50%) scale(1.2)}80%{transform:translateX(-50%) scale(1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:0}}

/* ========== 连击 ========== */
.combo-display{position:fixed;top:120px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:bold;color:#FF4500;z-index:200;animation:comboPop 1.5s forwards}
@keyframes comboPop{0%{transform:translateX(-50%) scale(0)}20%{transform:translateX(-50%) scale(1.3)}80%{transform:translateX(-50%) scale(1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:0}}

/* 管道 */
.pipe{position:absolute;bottom:15%;width:60px;height:80px;background:linear-gradient(90deg,#00AA00 0%,#00CC00 30%,#00AA00 60%,#008800 100%);border:3px solid #006600;border-radius:4px 4px 0 0;z-index:45}
.pipe::before{content:'';position:absolute;top:-15px;left:-5px;right:-5px;height:20px;background:linear-gradient(90deg,#00AA00 0%,#00CC00 30%,#00AA00 60%,#008800 100%);border:3px solid #006600;border-radius:4px}

/* 单词路障 */
.word-block{position:absolute;bottom:15%;width:70px;height:85px;z-index:48;animation:wordBlockPulse 1s infinite}
.word-block-icon{font-size:28px;text-align:center;line-height:40px}
.word-block-word{background:rgba(255,255,255,.95);color:#E86A17;font-size:12px;font-weight:bold;text-align:center;padding:2px 4px;border-radius:4px;border:2px solid #E86A17;margin-top:2px;white-space:nowrap}
@keyframes wordBlockPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.word-block.destroyed{animation:wordBlockDestroy .5s forwards}
@keyframes wordBlockDestroy{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.5}100%{transform:scale(0);opacity:0}}

/* ========== 库巴Boss ========== */
#bowser{position:fixed;bottom:30%;left:50%;transform:translateX(-50%);z-index:250;animation:bowserAppear 1s ease}
.bowser-sprite{font-size:80px;text-align:center}
.bowser-name{color:#FF4500;font-size:24px;font-weight:bold;text-align:center;text-shadow:2px 2px 0 #000}
@keyframes bowserAppear{0%{transform:translateX(-50%) scale(0) translateY(200px)}60%{transform:translateX(-50%) scale(1.2) translateY(0)}100%{transform:translateX(-50%) scale(1) translateY(0)}}

#boss-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border:4px solid #8B0000;border-radius:20px;padding:25px;text-align:center;z-index:300;box-shadow:0 10px 40px rgba(139,0,0,.5);transition:transform .3s;min-width:320px;max-width:90vw}
#boss-popup.show{transform:translate(-50%,-50%) scale(1)}
#boss-popup h2{color:#8B0000;font-size:22px;margin-bottom:10px}
.boss-sentence{font-size:28px;font-weight:bold;color:#333;margin:15px 0;line-height:1.6}
.boss-sentence .blank{color:#FF4500;border-bottom:3px solid #FF4500;padding:0 8px}
.boss-hint{color:#888;font-size:14px;margin:10px 0}

/* ========== 旗杆 ========== */
#flagpole{position:absolute;bottom:15%;width:8px;height:250px;z-index:90}
.flag-pole{position:absolute;bottom:0;width:4px;height:100%;background:#888;left:2px}
.flag-flag{position:absolute;top:0;left:8px;font-size:24px;animation:flagWave 1s infinite}
.flag-ball{position:absolute;top:-8px;left:0;width:12px;height:12px;background:#FFD700;border-radius:50%}
@keyframes flagWave{0%,100%{transform:rotate(0)}50%{transform:rotate(10deg)}}

/* ========== Course Clear ========== */
#course-clear{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;color:#fff;text-align:center;padding:20px}
.cc-text{font-size:48px;font-weight:bold;color:#FFD700;text-shadow:3px 3px 0 #E86A17;animation:ccBounce 1s ease}
@keyframes ccBounce{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.cc-stats{margin:20px 0;font-size:20px;line-height:2}
.cc-congrats{font-size:28px;color:#FFD700;margin:15px 0;animation:ccBounce 1s ease .5s both}

/* ========== 烟花 ========== */
.firework{position:fixed;width:8px;height:8px;border-radius:50%;z-index:501;animation:fireworkPop .8s ease forwards}
@keyframes fireworkPop{0%{transform:scale(0);opacity:1;box-shadow:0 0 0 0 currentColor}50%{transform:scale(1);opacity:1;box-shadow:0 0 40px 20px currentColor}100%{transform:scale(2);opacity:0;box-shadow:0 0 80px 40px currentColor}}

/* ========== 管道交互 ========== */
.warp-pipe{position:relative}
.pipe-warp-icon{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:14px;animation:warpPulse 1s infinite}
@keyframes warpPulse{0%,100%{opacity:.5}50%{opacity:1}}
.piranha{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:28px;height:32px;background:linear-gradient(to bottom,#228B22 0%,#32CD32 30%,#FF1493 30%,#DC143C 50%,#228B22 50%,#32CD32 80%);border-radius:50% 50% 10% 10%;box-shadow:0 4px 8px rgba(0,0,0,.3);animation:piranhaPop .3s ease}
.piranha::before,.piranha::after{content:'';position:absolute;top:-8px;width:12px;height:16px;background:#fff;border-radius:50%;border:2px solid #000}
.piranha::before{left:2px}
.piranha::after{right:2px}
.piranha::before::after,.piranha::after::after{content:'';position:absolute;top:50%;left:50%;width:4px;height:4px;background:#000;border-radius:50%;transform:translate(-50%,-50%)}
@keyframes piranhaPop{0%{transform:translateX(-50%) scaleY(0);transform-origin:bottom}100%{transform:translateX(-50%) scaleY(1);transform-origin:bottom}}

/* ========== 静音按钮 ========== */
#mute-btn{background:rgba(0,0,0,.6);color:#fff;border:none;padding:8px 10px;border-radius:20px;font-size:14px;cursor:pointer;z-index:200}
#mute-btn:hover{background:rgba(0,0,0,.8)}
</style>
</head>
<body>
<div id="game">

<div class="sky">
  <div class="sun"></div>
  <div class="cloud cloud-1">☁️</div>
  <div class="cloud cloud-2">☁️</div>
  <div class="cloud cloud-3">☁️</div>
  <div class="cloud cloud-1" style="animation-delay:-10s;font-size:35px;top:18%">☁️</div>
  <div class="cloud cloud-2" style="animation-delay:-5s;font-size:25px;top:20%">☁️</div>
  <div class="mountain" style="left:20%"></div>
  <div class="mountain" style="left:60%;height:60px;width:90px"></div>
  <div class="mountain" style="left:85%;height:70px;width:100px"></div>
</div>

<div class="ground"></div>

<div id="hud">
  <div>🍄 <span id="level-name">1-1</span></div>
  <div>🪙 <span id="coins">0</span></div>
  <div>🚧 <span id="defeated">0</span>/<span id="level-words">5</span></div>
  <div>❤️ <span id="lives">3</span></div>
  <div>⭐ <span id="score">0</span></div>
  <button id="mute-btn" onclick="toggleMute()">🔊</button>
</div>

<div id="mario" class="mario">
  <div class="mario-sprite"></div>
</div>

<div id="bricks"></div>
<div id="enemies"></div>
<div id="items"></div>
<div id="pipes"></div>
<div id="word-blocks"></div>

<div id="boss-popup"></div>

<div class="word-popup" id="word-popup">
  <h2>🧱 顶到了单词砖！</h2>
  <div class="word-pron" id="popup-pron"></div>
  <div class="word-en" id="popup-word"></div>
  <div style="color:#666;margin:10px 0;font-size:14px">选择正确的中文意思</div>
  <div class="choices" id="popup-choices"></div>
  <div class="feedback" id="popup-feedback"></div>
</div>

<div class="screen" id="start-screen">

<script>
// ========== 音效 ==========
const AudioContext=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function sfx(freq,dur,type='square',vol=0.1){
  try{const ctx=audioCtx||(audioCtx=new AudioContext());const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}
}
function sfxJump(){sfx(300,.1);sfx(450,.1)}
function sfxCoin(){sfx(900,.1,'sine');setTimeout(()=>sfx(1200,.1,'sine'),80)}
function sfxCorrect(){sfx(523,.1,'sine');setTimeout(()=>sfx(659,.1,'sine'),100);setTimeout(()=>sfx(784,.2,'sine'),200)}
function sfxWrong(){sfx(200,.2,'sawtooth');setTimeout(()=>sfx(150,.25,'sawtooth'),150)}
function sfxPowerUp(){[300,400,500,600,800].forEach((f,i)=>setTimeout(()=>sfx(f,.15,'sine'),i*100))}
function sfxBump(){sfx(150,.1,'square',0.15)}

// ========== 单词库 ==========
const WORDS=[
  {en:'red',cn:'红色',pron:'/red/'},{en:'blue',cn:'蓝色',pron:'/bluː/'},
  {en:'cat',cn:'猫',pron:'/kæt/'},{en:'dog',cn:'狗',pron:'/dɒɡ/'},
  {en:'one',cn:'一',pron:'/wʌn/'},{en:'two',cn:'二',pron:'/tuː/'},
  {en:'green',cn:'绿色',pron:'/ɡriːn/'},{en:'yellow',cn:'黄色',pron:'/ˈjel.əʊ/'},
  {en:'bird',cn:'鸟',pron:'/bɜːd/'},{en:'fish',cn:'鱼',pron:'/fɪʃ/'},
  {en:'apple',cn:'苹果',pron:'/ˈæp.əl/'},{en:'banana',cn:'香蕉',pron:'/bəˈnɑː.nə/'},
  {en:'orange',cn:'橙子',pron:'/ˈɒr.ɪndʒ/'},{en:'elephant',cn:'大象',pron:'/ˈel.ɪ.fənt/'},
  {en:'book',cn:'书',pron:'/bʊk/'},{en:'pen',cn:'笔',pron:'/pen/'},
  {en:'sun',cn:'太阳',pron:'/sʌn/'},{en:'moon',cn:'月亮',pron:'/muːn/'},
  {en:'water',cn:'水',pron:'/ˈwɔː.tər/'},{en:'milk',cn:'牛奶',pron:'/mɪlk/'}
];

// ========== 游戏状态 ==========
let coins=0,score=0,lives=3;
let isBig=false,hasFire=false,isStar=false;
let gameActive=false,gamePaused=false;
let marioX=0,marioY=0;
let isJumping=false;
let marioVY=0; // 马里奥垂直速度（正=下落）
let keys={left:false,right:false,up:false,down:false};
let enemies=[],bricks=[],items=[],pipes=[],wordBlocks=[];
let enemiesDefeated=0,combo=0,maxCombo=0;
let gameLoop=null,spawnTimer=null;
let scrollOffset=0;
let isInvincible=false; // 无敌时间
let invincibleTimer=null;
let currentEnemyIndex=-1; // 当前正在问答的敌人索引（-1表示没有）
let currentBlockIndex=-1; // 当前正在问答的路障索引（-1表示没有）

// ========== 关卡系统 ==========
const LEVELS=[
  {name:'1-1',words:5,distance:3000,speed:1,enemyRate:0.3,pipeRate:0.15},
  {name:'1-2',words:6,distance:3500,speed:1.2,enemyRate:0.35,pipeRate:0.15},
  {name:'2-1',words:6,distance:3500,speed:1.3,enemyRate:0.4,pipeRate:0.2},
  {name:'2-2',words:7,distance:4000,speed:1.5,enemyRate:0.45,pipeRate:0.2},
  {name:'3-1',words:8,distance:4500,speed:1.6,enemyRate:0.5,pipeRate:0.25}
];
let currentLevel=0; // 当前关卡索引
let levelWordsAnswered=0; // 当前关卡已答对单词数
let levelWords=[]; // 当前关卡使用的单词
let bossDefeated=false; // 库巴是否已击败
let bossActive=false; // 库巴是否在战斗中
let flagpoleX=-1; // 旗杆X位置，-1表示未出现
let levelComplete=false; // 关卡是否完成
let bgmPlaying=false; // BGM是否在播放
let bgmMuted=false; // BGM是否静音
let bgmInterval=null; // BGM定时器

// 填空句子库（用单词填空）
const SENTENCES=[
  {text:'I have a ___ cat.',words:['red','blue','green','yellow']},
  {text:'The ___ is shining.',words:['sun','moon','water','milk']},
  {text:'I see a ___ in the sky.',words:['bird','fish','cat','dog']},
  {text:'I drink ___ every day.',words:['milk','water','book','pen']},
  {text:'The ___ is round and bright.',words:['moon','sun','apple','book']},
  {text:'My favorite fruit is ___.',words:['apple','banana','orange','elephant']},
  {text:'I write with a ___.',words:['pen','book','water','cat']},
  {text:'I like to eat ___.',words:['orange','elephant','sun','moon']},
  {text:'The ___ can fly.',words:['bird','fish','dog','cat']},
  {text:'A ___ can swim.',words:['fish','bird','sun','book']},
  {text:'I read a ___ every night.',words:['book','pen','water','apple']},
  {text:'The ___ is yellow.',words:['banana','apple','cat','dog']},
  {text:'Look at the green ___.',words:['green','red','blue','yellow']},
  {text:'One and ___ is three.',words:['two','one','book','cat']},
  {text:'I have ___ dog.',words:['one','two','sun','moon']},
  {text:'The ___ is very big.',words:['elephant','cat','pen','sun']}
];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// ========== 基于Pygame地图的关卡数据 ==========
const LEVEL_MAP={
  ground:[
    {x:0,y:538,width:800,height:60}
  ],
  pipes:[],
  bricks:[
    {x:100,y:365,type:'normal'},{x:140,y:365,type:'normal'},{x:180,y:365,type:'normal'},
    {x:300,y:365,type:'question',item:true},{x:340,y:365,type:'question',item:true},
    {x:500,y:250,type:'normal'},{x:540,y:250,type:'normal'},{x:580,y:250,type:'normal'},
    {x:700,y:365,type:'question',item:true}
  ]
};

// ========== 游戏控制 ==========
function startGame(){
  coins=0;score=0;lives=3;isBig=false;hasFire=false;isStar=false;
  enemiesDefeated=0;combo=0;maxCombo=0;scrollOffset=0;
  marioVY=0;currentLevel=0;
  enemies=[];bricks=[];items=[];pipes=[];wordBlocks=[];
  gameActive=true;gamePaused=false;
  currentLevel=0;levelWordsAnswered=0;levelWords=[];bossDefeated=false;bossActive=false;
  flagpoleX=-1;levelComplete=false;marioVY=0;
  
  marioX=window.innerWidth*0.15;
  marioY=0;
  isJumping=false;
  isInvincible=true; // 开始时无敌3秒
  
  updateHUD();
  updateMario();
  
  // 无敌闪烁效果
  const mario=document.getElementById('mario');
  mario.style.opacity='0.5';
  
  // 3秒后取消无敌
  if(invincibleTimer)clearTimeout(invincibleTimer);
  invincibleTimer=setTimeout(()=>{
    isInvincible=false;
    mario.style.opacity='1';
  },3000);
  
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hide'));
  document.getElementById('word-popup').classList.remove('show');
  document.getElementById('fire-btn').classList.add('hide');
  
  document.getElementById('bricks').innerHTML='';
  document.getElementById('enemies').innerHTML='';
  document.getElementById('items').innerHTML='';
  document.getElementById('pipes').innerHTML='';
  document.getElementById('word-blocks').innerHTML='';
  
  // 生成初始关卡
  initLevel();
  
  if(gameLoop)cancelAnimationFrame(gameLoop);
  gameLoop=requestAnimationFrame(gameUpdate);
  
  if(spawnTimer)clearInterval(spawnTimer);
  spawnTimer=setInterval(spawnThings,5000);
  
  // 启动BGM
  startBGM();
}

function generateLevel(){
  const scale=window.innerWidth/800;
  
  // 生成管道
  LEVEL_MAP.pipes.forEach(p=>{
    const pipe=document.createElement('div');
    pipe.className='pipe';
    pipe.style.left=(p.x*scale)+'px';
    pipe.style.bottom=(15+(538-p.y-p.height)/600*85)+'%';
    pipe.style.width=(p.width*scale)+'px';
    pipe.style.height=(p.height/600*85)+'%';
    document.getElementById('pipes').appendChild(pipe);
    pipes.push({el:pipe,x:p.x*scale,y:p.y,width:p.width*scale,height:p.height});
  });
  
  // 生成砖块
  LEVEL_MAP.bricks.forEach(b=>{
    const brick=document.createElement('div');
    brick.className='brick '+(b.type==='question'?'brick-question':b.type==='item'?'brick-item':'brick-normal');
    brick.style.left=(b.x*scale)+'px';
    brick.style.bottom=(35+(538-b.y-40)/600*50)+'%';
    document.getElementById('bricks').appendChild(brick);
    
    const brickData={el:brick,x:b.x*scale,hit:false,type:b.item?'item':'normal'};
    if(b.item)brickData.item=['mushroom','flower','star'][Math.floor(Math.random()*3)];
    bricks.push(brickData);
  });
}

function gameUpdate(){
  if(!gameActive||gamePaused){
    gameLoop=requestAnimationFrame(gameUpdate);
    return;
  }
  
  const speed=LEVELS[currentLevel].speed; // 关卡速度
  scrollOffset+=speed;
  
  // 重力系统 - 更新马里奥垂直位置
  if(isJumping||marioY>0){
    marioVY-=0.5; // 重力加速度（向下递减）
    marioY+=marioVY;
    if(marioY<=0&&marioVY>0){ // 只有下落时才着地
      marioY=0;marioVY=8;isJumping=false;
      mario.classList.remove('jump');
    }
  }
  
  // 水平移动
  if(keys.left){marioX-=4}
  else if(keys.right){marioX+=4}
  
  const maxX=window.innerWidth-60;
  if(marioX<20)marioX=20;
  if(marioX>maxX)marioX=maxX;
  
  // 更新马里欧位置
  mario=document.getElementById('mario');
  mario.style.left=marioX+'px';
  mario.style.bottom=(15+marioY)+'%';
  
  // 移动所有元素（滚动效果）
  enemies.forEach((e,i)=>{
    e.x-=speed;
    e.el.style.left=e.x+'px';
    if(e.x<-50){e.el.remove();enemies.splice(i,1)}
    
    if(!e.dead&&checkHit(mario,e.el)&&!e.stomped){
      if(isStar){
        killEnemy(e,i)
      }
      else if(isStomp(mario,e.el)){
        // 从上方踩到敌人 - 触发单词问答
        e.stomped=true;
        e.el.classList.add('flat');
        // 踩敌后弹起
        marioVY=6;
        gamePaused=true;
        showWordPopupForEnemy(e,i);
      }
      else if(!isInvincible){
        hurtMario()
      }
    }
  });
  
  bricks.forEach((b,i)=>{
    b.x-=speed;
    b.el.style.left=b.x+'px';
    if(b.x<-100){b.el.remove();bricks.splice(i,1)}
    
    if(!b.hit&&checkHit(mario,b.el)){
      hitBrick(b,i);
    }
  });
  
  items.forEach((item,i)=>{
    item.x-=speed;
    item.el.style.left=item.x+'px';
    if(item.x<-50){item.el.remove();items.splice(i,1)}
    
    if(checkHit(mario,item.el)){
      getItem(item.type);
      item.el.remove();
      items.splice(i,1);
    }
  });
  
  pipes.forEach((p,i)=>{
    p.x-=speed;
    p.el.style.left=p.x+'px';
    if(p.x<-100){p.el.remove();pipes.splice(i,1)}
  });
  
  // 单词路障碰撞检测
  wordBlocks.forEach((wb,i)=>{
    wb.x-=speed;
    wb.el.style.left=wb.x+'px';
    if(wb.x<-100){wb.el.remove();wordBlocks.splice(i,1)}
    
    if(!wb.hit&&checkHit(mario,wb.el)){
      wb.hit=true;
      gamePaused=true;
      showWordPopupForBlock(wb,i);
    }
  });
  
  // 旗杆滚动
  if(flagpoleX!==-1&&!levelComplete){
    flagpoleX-=speed;
    const fp=document.getElementById('flagpole');
    if(fp)fp.style.left=flagpoleX+'px';
  }
  
  // 持续生成新内容
  if(scrollOffset%400===0){
    spawnChunk();
  }
  
  // 检查管道交互
  checkPipeInteraction();
  
  // 检查旗杆
  checkFlagpole();
  
  // 关卡完成检查
  if(!levelComplete){
    const level=LEVELS[currentLevel];
    // 到达关卡距离 + 单词全部答对 + 库巴已击败 → 出旗杆
    if(scrollOffset>=level.distance && levelWordsAnswered>=level.words && bossDefeated){
      if(flagpoleX===-1){
        flagpoleX=window.innerWidth+50;
        spawnFlagpole(flagpoleX);
      }
    }
    // 到达关卡距离但单词未全答对 → 生成库巴
    if(scrollOffset>=level.distance-200 && !bossDefeated && !bossActive){
      bossActive=true;
      spawnBoss();
    }
  }
  
  gameLoop=requestAnimationFrame(gameUpdate);
}

function spawnChunk(){
  const gameW=window.innerWidth;
  const startX=gameW+50;
  const level=LEVELS[currentLevel];
  
  // 根据关卡距离确定当前节奏位置
  const pos=scrollOffset;
  const progress=pos/level.distance; // 0~1
  
  // 距离快到尽头时不再生成（给库巴和旗杆留空间）
  if(progress>0.85)return;
  
  // 根据进度决定生成什么
  // 路障节奏：在关卡进度0.1~0.8之间均匀分布单词
  const wordsNeeded=level.words-levelWordsAnswered; // 还需要答对的单词数
  const wordsRemaining=Math.max(0,1-progress)*level.words; // 估计剩余距离应含的单词数
  
  // 单词路障：有概率生成，确保足够单词
  if(wordsNeeded>0 && Math.random()<0.25){
    spawnWordBlock(startX);
    return;
  }
  
  // 管道
  if(Math.random()<level.pipeRate){
    if(Math.random()<0.4){
      // 食人花管道
      spawnPiranhaPipe(startX);
    }else{
      // 普通管道（可传送）
      spawnWarpPipe(startX);
    }
    return;
  }
  
  // 敌人
  if(Math.random()<level.enemyRate){
    const tooCloseToBarrier=wordBlocks.some(wb=>Math.abs(wb.x-startX)<250);
    if(!tooCloseToBarrier){
      spawnEnemyFar(startX);
    }
    return;
  }
  
  // 砖块
  const chunkType=Math.floor(Math.random()*3);
  if(chunkType===0){
    for(let i=0;i<3;i++)spawnBrick(startX+i*45,'normal','brick-h1');
    spawnBrick(startX+135,'question','brick-h1',true);
  }else if(chunkType===1){
    for(let i=0;i<4;i++)spawnBrick(startX+i*45,'normal','brick-h2');
    spawnBrick(startX+90,'question','brick-h2',true);
  }else{
    spawnBrick(startX,'item','brick-h1',true);
    for(let i=1;i<4;i++)spawnBrick(startX+i*45,'normal','brick-h1');
  }
}

function spawnBrick(x,type,heightClass,hasItem=false){
  const brick=document.createElement('div');
  brick.className='brick '+(type==='question'?'brick-question':type==='item'?'brick-item':'brick-normal')+' '+heightClass;
  brick.style.left=x+'px';
  document.getElementById('bricks').appendChild(brick);
  
  const brickData={el:brick,x:x,hit:false,type:hasItem?'item':'normal'};
  if(hasItem)brickData.item=['mushroom','flower','star'][Math.floor(Math.random()*3)];
  bricks.push(brickData);
}

function spawnPipe(x){
  const pipe=document.createElement('div');
  pipe.className='pipe';
  pipe.style.left=x+'px';
  pipe.style.bottom='15%';
  pipe.style.width='60px';
  pipe.style.height='80px';
  document.getElementById('pipes').appendChild(pipe);
  pipes.push({el:pipe,x:x,y:0,width:60,height:80});
}

function spawnWordBlock(x){
  // 从关卡单词中选取未使用的单词
  const level=LEVELS[currentLevel];
  const usedWords=wordBlocks.map(wb=>wb.word.en);
  const available=levelWords.filter(w=>!usedWords.includes(w.en));
  if(available.length===0)return; // 所有单词已用完
  const word=available[Math.floor(Math.random()*available.length)];
  const block=document.createElement('div');
  block.className='word-block';
  block.style.left=x+'px';
  block.innerHTML='<div class="word-block-icon">🚧</div><div class="word-block-word">'+word.en+'</div>';
  document.getElementById('word-blocks').appendChild(block);
  wordBlocks.push({el:block,x:x,word:word,hit:false});
}

function initLevel(){
  const level=LEVELS[currentLevel];
  levelWordsAnswered=0;
  bossDefeated=false;bossActive=false;
  flagpoleX=-1;levelComplete=false;
  // 从词库中随机选取本关单词
  const shuffled=shuffle([...WORDS]);
  levelWords=shuffled.slice(0,level.words);
  // 生成初始关卡元素
  generateLevel();
  // 显示关卡提示
  showStatus('关卡 '+level.name+' 开始！');
}

// ========== 库巴Boss ==========
function spawnBoss(){
  gamePaused=true;
  const bossEl=document.createElement('div');
  bossEl.id='bowser';
  bossEl.innerHTML='<div class="bowser-sprite">🐉</div><div class="bowser-name">库巴</div>';
  document.getElementById('game').appendChild(bossEl);
  sfxBowser();
  
  setTimeout(()=>{
    bossEl.remove();
    showBossQuiz();
  },1500);
}

function sfxBowser(){
  sfx(100,.4,'sawtooth',0.15);
  setTimeout(()=>sfx(80,.4,'sawtooth',0.15),200);
  setTimeout(()=>sfx(120,.3,'sawtooth',0.15),400);
}

function showBossQuiz(){
  // 从本关已出现的单词中出填空题
  const sentence=SENTENCES[Math.floor(Math.random()*SENTENCES.length)];
  const correctWord=sentence.words[0]; // 正确答案在第一个
  const shuffledOpts=shuffle([...sentence.words]);
  
  const popup=document.getElementById('boss-popup');
  popup.innerHTML='<h2>🐉 库巴出现了！</h2>'+
    '<div class="boss-sentence">'+sentence.text.replace('___','<span class="blank">___</span>')+'</div>'+
    '<div class="boss-hint">选择正确的单词填入空格</div>'+
    '<div class="boss-choices" id="boss-choices"></div>'+
    '<div class="feedback" id="boss-feedback"></div>';
  
  const choicesDiv=document.getElementById('boss-choices');
  shuffledOpts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=function(){checkBossAnswer(this,opt,correctWord,sentence)};
    choicesDiv.appendChild(btn);
  });
  
  popup.classList.add('show');
}

function checkBossAnswer(btn,ans,correct,sentence){
  document.querySelectorAll('#boss-popup .choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('boss-feedback');
  
  if(ans===correct){
    btn.classList.add('right');
    fb.innerHTML='<span style="color:green">✅ 答对了！库巴被打败了！</span>';
    sfxCorrect();
    bossDefeated=true;
    score+=500;
    
    setTimeout(()=>{
      document.getElementById('boss-popup').classList.remove('show');
      gamePaused=false;
      showStatus('库巴被击败了！');
      // 继续游戏，旗杆会自动出现
    },2000);
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('#boss-popup .choice').forEach(b=>{if(b.textContent===correct)b.classList.add('right')});
    fb.innerHTML='<span style="color:red">❌ 不对！库巴攻击了你！</span>';
    sfxWrong();
    lives--;
    
    if(lives<=0){
      setTimeout(()=>{
        document.getElementById('boss-popup').classList.remove('show');
        loseGame();
      },1500);

function startBGM(){
  if(bgmMuted)return;
  // 确保AudioContext已激活（移动端需要用户交互后resume）
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  bgmPlaying=true;
  // 经典SMB地上关BGM音符序列（简化版）
  const melody=[
    659,659,0,659,0,523,659,0,784,0,0,0,392,0,0,0,
    523,0,0,392,0,0,330,0,0,440,0,494,0,440,0,392,
    659,784,880,0,698,784,0,659,523,587,494,0,523,0,0,0
  ];
  let noteIndex=0;
  
  if(bgmInterval)clearInterval(bgmInterval);
  bgmInterval=setInterval(()=>{
    if(!bgmPlaying||bgmMuted)return;
    const freq=melody[noteIndex%melody.length];
    if(freq>0)sfx(freq,.15,'square',0.08);
    noteIndex++;
  },180);
}

function stopBGM(){
  bgmPlaying=false;
  if(bgmInterval)clearInterval(bgmInterval);
}

}

function checkAnswer(btn,ans,correct){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('popup-feedback');
  
  const isEnemyCase=currentEnemyIndex!==-1;
  const isBlockCase=currentBlockIndex!==-1;
  
  if(ans===correct){
    // 答对后2秒无敌时间
    isInvincible=true;
    mario=document.getElementById('mario');
    mario.classList.add('invincible');
    clearTimeout(invincibleTimer);
    invincibleTimer=setTimeout(()=>{
      isInvincible=false;
      mario.classList.remove('invincible');
    },2000);
    
    btn.classList.add('right');
    combo++;
    const bonus=combo>1?' (连击x'+combo+')':'';
    fb.innerHTML='<span style="color:green">✅ 答对了！'+bonus+'</span>';
    sfxCorrect();
    
    const points=100*combo;
    coins+=10*combo;
    score+=points;
    
    if(isEnemyCase){
      // 敌人情况：消灭敌人
      if(currentEnemyIndex>=0&&currentEnemyIndex<enemies.length){
        const e=enemies[currentEnemyIndex];
        e.el.remove();
        enemies.splice(currentEnemyIndex,1);
        score+=100;
        enemiesDefeated++;
      }
      currentEnemyIndex=-1;
    }else if(isBlockCase){
      // 路障情况：路障消失，计入关卡进度
      if(currentBlockIndex>=0&&currentBlockIndex<wordBlocks.length){
        const wb=wordBlocks[currentBlockIndex];
        wb.el.classList.add('destroyed');
        setTimeout(()=>{wb.el.remove();wordBlocks.splice(currentBlockIndex,1)},500);
        score+=50;
        levelWordsAnswered++; // 答对路障单词计入关卡进度
      }
      currentBlockIndex=-1;
    }
    
    if(combo>=2){
      const comboEl=document.createElement('div');
      comboEl.className='combo-display';
      comboEl.textContent='🔥 '+combo+'连击！';
      document.body.appendChild(comboEl);
      setTimeout(()=>comboEl.remove(),1500);
    }
    if(combo>maxCombo)maxCombo=combo;
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===correct)b.classList.add('right')});
    fb.innerHTML='<span style="color:red">❌ 不对，答案是：'+correct+'</span>';
    sfxWrong();
    combo=0;
    
    if(isEnemyCase){
      // 敌人情况：敌人复活，扣命
      if(currentEnemyIndex>=0&&currentEnemyIndex<enemies.length){
        const e=enemies[currentEnemyIndex];
        e.stomped=false;
        e.el.classList.remove('flat');
      }
      currentEnemyIndex=-1;
      lives--;
    }else if(isBlockCase){
      // 路障情况：路障不消失，扣命
      if(currentBlockIndex>=0&&currentBlockIndex<wordBlocks.length){
        wordBlocks[currentBlockIndex].hit=false; // 允许再次碰撞
      }
      currentBlockIndex=-1;
      lives--;
    }
  }
  
  updateHUD();
  
  setTimeout(()=>{
    document.getElementById('word-popup').classList.remove('show');
    gamePaused=false;
    if(lives<=0)loseGame();
  },1500);
}

function checkHit(el1,el2){
  const r1=el1.getBoundingClientRect();
  const r2=el2.getBoundingClientRect();
  return!(r1.right<r2.left||r1.left>r2.right||r1.bottom<r2.top||r1.top>r2.bottom);
}

// 判断是否为踩踏（从上方下落碰到敌人）
function isStomp(marioEl,enemyEl){
  const r1=marioEl.getBoundingClientRect();
  const r2=enemyEl.getBoundingClientRect();
  // 马里奥底部在敌人顶部附近 + 正在下落 + 横向有一定重叠
  const marioBottom=r1.bottom;
  const enemyTop=r2.top;
  const overlap=Math.min(r1.right,r2.right)-Math.max(r1.left,r2.left);
  return marioVY>0 && marioBottom<enemyTop+15 && overlap>r2.width*0.3;
}

  document.getElementById('win-coins').textContent=coins;
  document.getElementById('win-score').textContent=score;
  document.getElementById('win-screen').classList.remove('hide');
}

function loseGame(){
  gameActive=false;
  clearInterval(spawnTimer);
  stopBGM();
  document.getElementById('fail-score').textContent=score;
  document.getElementById('fail-screen').classList.remove('hide');
}

// ========== 控制函数 ==========
function moveLeft(){marioX-=30;updateMarioPosition()}
function moveRight(){marioX+=30;updateMarioPosition()}
function jump(){
  if(isJumping)return;
  isJumping=true;
  marioVY=8; // 向上速度（正值向上）
  sfxJump();
  
  mario=document.getElementById('mario');
  mario.classList.add('jump');
}

function updateMarioPosition(){
  mario=document.getElementById('mario');
  mario.style.left=marioX+'px';
}

// 键盘控制
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA'){e.preventDefault();moveLeft()}
  else if(e.code==='ArrowRight'||e.code==='KeyD'){e.preventDefault();moveRight()}
  else if(e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW'){e.preventDefault();jump()}
  else if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();keys.down=true}
  else if(e.code==='KeyF'){e.preventDefault();shootFire()}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowDown'||e.code==='KeyS')keys.down=false;
});

// 触摸控制 - 左右按钮长按 + 游戏区域点击跳跃
let leftHold=null,rightHold=null;
const leftBtn=document.getElementById('left-btn');
const rightBtn=document.getElementById('right-btn');
function startLeft(){if(leftHold)return;leftBtn.classList.add('active');moveLeft();leftHold=setInterval(moveLeft,80)}
function stopLeft(){if(leftHold){clearInterval(leftHold);leftHold=null}leftBtn.classList.remove('active')}
function startRight(){if(rightHold)return;rightBtn.classList.add('active');moveRight();rightHold=setInterval(moveRight,80)}
function stopRight(){if(rightHold){clearInterval(rightHold);rightHold=null}rightBtn.classList.remove('active')}
leftBtn.addEventListener('touchstart',e=>{e.preventDefault();startLeft()});
leftBtn.addEventListener('touchend',e=>{e.preventDefault();stopLeft()});
leftBtn.addEventListener('touchcancel',stopLeft);
rightBtn.addEventListener('touchstart',e=>{e.preventDefault();startRight()});
rightBtn.addEventListener('touchend',e=>{e.preventDefault();stopRight()});
rightBtn.addEventListener('touchcancel',stopRight);
leftBtn.addEventListener('mousedown',startLeft);
leftBtn.addEventListener('mouseup',stopLeft);
leftBtn.addEventListener('mouseleave',stopLeft);
rightBtn.addEventListener('mousedown',startRight);
rightBtn.addEventListener('mouseup',stopRight);
rightBtn.addEventListener('mouseleave',stopRight);
// 下按钮（管道传送）
const downBtn=document.getElementById('down-btn');
downBtn.addEventListener('touchstart',e=>{e.preventDefault();keys.down=true});
downBtn.addEventListener('touchend',e=>{e.preventDefault();keys.down=false});
downBtn.addEventListener('touchcancel',()=>{keys.down=false});
downBtn.addEventListener('mousedown',()=>{keys.down=true});
downBtn.addEventListener('mouseup',()=>{keys.down=false});
downBtn.addEventListener('mouseleave',()=>{keys.down=false});
document.getElementById('game').addEventListener('touchstart',e=>{
  if(e.target.closest('.ctrl-btn')||e.target.closest('.screen')||e.target.closest('.word-popup')||e.target.closest('.btn'))return;
  e.preventDefault();jump();
});
document.getElementById('game').addEventListener('click',e=>{
  if(e.target.closest('.ctrl-btn')||e.target.closest('.screen')||e.target.closest('.word-popup')||e.target.closest('.btn'))return;
  jump();
});
</script>
</body>
</html>
